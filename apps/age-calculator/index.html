<body>
  <div class="container">
    <a href="../../" class="back-link">← Back to all tools</a>
    <h1>🎂 Age Calculator</h1>
    <p class="subtitle">Calculate your exact age down to the second — find out how old you really are</p>

    <div class="card">
      <div class="date-inputs">
        <div class="date-group">
          <label>Date of Birth</label>
          <input type="date" id="birthDate">
        </div>
        <div class="date-group">
          <label>On This Date (optional)</label>
          <input type="date" id="targetDate">
        </div>
      </div>

      <button class="btn" id="calculateBtn">🎯 Calculate Age</button>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <div class="age-display">
        <div class="age-main" id="ageMain">0 <span class="unit">years</span></div>
        <div class="age-detail" id="ageDetail">or 0 months, or 0 days old</div>

        <div class="age-breakdown" id="breakdownBasic">
          <div class="breakdown-item">
            <div class="num" id="dispYears">0</div>
            <div class="lbl">Years</div>
          </div>
          <div class="breakdown-item">
            <div class="num" id="dispMonths">0</div>
            <div class="lbl">Months</div>
          </div>
          <div class="breakdown-item">
            <div class="num" id="dispDays">0</div>
            <div class="lbl">Days</div>
          </div>
        </div>

        <div class="breakdown-wide">
          <div class="breakdown-item">
            <div class="num" id="dispHours">0</div>
            <div class="lbl">Hours</div>
          </div>
          <div class="breakdown-item">
            <div class="num" id="dispMinutes">0</div>
            <div class="lbl">Minutes</div>
          </div>
          <div class="breakdown-item">
            <div class="num" id="dispSeconds">0</div>
            <div class="lbl">Seconds</div>
          </div>
          <div class="breakdown-item">
            <div class="num" id="dispTotalDays">0</div>
            <div class="lbl">Total Days</div>
          </div>
        </div>

        <div class="next-birthday" id="nextBirthday"></div>
      </div>
    </div>

    <!-- Adsterra Ad -->
    <div class="ad-section" id="adContainer">
      <script type="text/javascript">
        (function() {
          var c = document.getElementById('adContainer');
          if (!c) return;
          try {
            var s = document.createElement('script');
            s.type = 'text/javascript';
            s.src = '//pl191315.effectivegate.com/1c/cc/ab/1cccab04fdd2b1742bb6b1f3689d1c91.js';
            s.async = true;
            c.innerHTML = '';
            c.appendChild(s);
          } catch(e) {}
        })();
      </script>
    </div>

    <div class="footer">
      <p>Free Age Calculator &middot; 100% client-side &middot; <a href="../../">More Tools</a></p>
    </div>
  </div>

  <script>
    (function() {
      var birthInput = document.getElementById('birthDate');
      var targetInput = document.getElementById('targetDate');
      var calculateBtn = document.getElementById('calculateBtn');
      var resultCard = document.getElementById('resultCard');

      // Set max to today
      var today = new Date();
      var y = today.getFullYear();
      var m = String(today.getMonth() + 1).padStart(2, '0');
      var d = String(today.getDate()).padStart(2, '0');
      var todayStr = y + '-' + m + '-' + d;
      birthInput.max = todayStr;
      targetInput.value = todayStr;

      // Set default birth date to 18 years ago
      var defY = y - 18;
      birthInput.value = defY + '-' + m + '-' + d;

      function calculateAge() {
        var birthVal = birthInput.value;
        var targetVal = targetInput.value || todayStr;

        if (!birthVal) {
          alert('Please select your date of birth.');
          return;
        }

        var birth = new Date(birthVal + 'T00:00:00');
        var target = new Date(targetVal + 'T00:00:00');

        if (birth >= target) {
          alert('Date of birth must be before the target date.');
          return;
        }

        // Years, months, days
        var years = target.getFullYear() - birth.getFullYear();
        var months = target.getMonth() - birth.getMonth();
        var days = target.getDate() - birth.getDate();

        if (days < 0) {
          months--;
          var prevMonth = new Date(target.getFullYear(), target.getMonth(), 0);
          days += prevMonth.getDate();
        }
        if (months < 0) {
          years--;
          months += 12;
        }

        // Total calculations
        var diffMs = target - birth;
        var totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        var totalHours = Math.floor(diffMs / (1000 * 60 * 60));
        var totalMinutes = Math.floor(diffMs / (1000 * 60));
        var totalSeconds = Math.floor(diffMs / 1000);
        var remainingHours = totalHours % 24;
        var remainingMinutes = totalMinutes % 60;
        var remainingSeconds = totalSeconds % 60;

        // Update display
        document.getElementById('ageMain').innerHTML = years + ' <span class="unit">years</span>';
        document.getElementById('ageDetail').textContent = 'or ' + (years * 12 + months) + ' months, or ' + totalDays.toLocaleString() + ' days old';

        document.getElementById('dispYears').textContent = years;
        document.getElementById('dispMonths').textContent = months;
        document.getElementById('dispDays').textContent = days;
        document.getElementById('dispHours').textContent = remainingHours;
        document.getElementById('dispMinutes').textContent = remainingMinutes;
        document.getElementById('dispSeconds').textContent = remainingSeconds;
        document.getElementById('dispTotalDays').textContent = totalDays.toLocaleString();

        // Next birthday
        var nextBday = new Date(target.getFullYear(), birth.getMonth(), birth.getDate());
        if (nextBday <= target) {
          nextBday.setFullYear(nextBday.getFullYear() + 1);
        }
        var daysUntil = Math.ceil((nextBday - target) / (1000 * 60 * 60 * 24));
        var nextBdayStr = nextBday.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        document.getElementById('nextBirthday').innerHTML = '🎉 Next birthday: <strong>' + nextBdayStr + '</strong> (' + daysUntil + ' days away)';

        resultCard.style.display = 'block';
      }

      calculateBtn.addEventListener('click', calculateAge);

      // Auto-calculate on date change
      birthInput.addEventListener('change', calculateAge);
      targetInput.addEventListener('change', calculateAge);

      // Calculate on load
      calculateAge();
    })();
  </script>
</body>
</html>
