<body>
  <div class="container">
    <a href="../../" class="back-link">← Back to all tools</a>
    <h1>🔐 Base64 Encoder / Decoder</h1>
    <p class="subtitle">Encode text to Base64 or decode Base64 back to plain text instantly</p>

    <div class="card">
      <div class="mode-switch">
        <div class="mode-btn active" data-mode="encode">🔒 Encode</div>
        <div class="mode-btn" data-mode="decode">🔓 Decode</div>
      </div>

      <div class="label-row">
        <label id="inputLabel">Input Text</label>
        <span class="char-count" id="inputCount">0 chars</span>
      </div>
      <textarea id="inputText" placeholder="Type or paste text here..."></textarea>

      <button class="swap-btn" id="swapBtn" title="Swap input/output">⇅</button>

      <div class="label-row">
        <label id="outputLabel">Base64 Output</label>
        <span class="char-count" id="outputCount">0 chars</span>
      </div>
      <textarea class="output" id="outputText" placeholder="Result will appear here..." readonly></textarea>

      <div class="error" id="errorMsg"></div>

      <div class="action-row">
        <button class="btn" id="processBtn">⚡ Process</button>
        <button class="btn btn-secondary" id="copyBtn">📋 Copy Result</button>
        <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
      </div>
    </div>

    <div class="footer">
      <p>Free Base64 Encoder/Decoder &middot; 100% client-side &middot; <a href="../../">More Tools</a></p>
    </div>
  </div>

  <script>
    (function() {
      var modeBtns = document.querySelectorAll('.mode-btn');
      var inputText = document.getElementById('inputText');
      var outputText = document.getElementById('outputText');
      var inputLabel = document.getElementById('inputLabel');
      var outputLabel = document.getElementById('outputLabel');
      var inputCount = document.getElementById('inputCount');
      var outputCount = document.getElementById('outputCount');
      var errorMsg = document.getElementById('errorMsg');
      var processBtn = document.getElementById('processBtn');
      var copyBtn = document.getElementById('copyBtn');
      var clearBtn = document.getElementById('clearBtn');
      var swapBtn = document.getElementById('swapBtn');

      var currentMode = 'encode';

      function updateLabels() {
        if (currentMode === 'encode') {
          inputLabel.textContent = 'Input Text (plain)';
          outputLabel.textContent = 'Base64 Output';
        } else {
          inputLabel.textContent = 'Input Base64';
          outputLabel.textContent = 'Decoded Text';
        }
      }

      function updateCounts() {
        inputCount.textContent = inputText.value.length + ' chars';
        outputCount.textContent = outputText.value.length + ' chars';
      }

      function process() {
        var text = inputText.value;
        errorMsg.textContent = '';
        if (!text) {
          outputText.value = '';
          updateCounts();
          return;
        }

        try {
          if (currentMode === 'encode') {
            // Encode to Base64 with UTF-8 support
            var bytes = new TextEncoder().encode(text);
            var binary = '';
            for (var i = 0; i < bytes.length; i++) {
              binary += String.fromCharCode(bytes[i]);
            }
            outputText.value = btoa(binary);
          } else {
            // Decode from Base64
            var decoded = atob(text);
            var bytes2 = new Uint8Array(decoded.length);
            for (var j = 0; j < decoded.length; j++) {
              bytes2[j] = decoded.charCodeAt(j);
            }
            outputText.value = new TextDecoder().decode(bytes2);
          }
        } catch(e) {
          if (currentMode === 'decode') {
            errorMsg.textContent = '❌ Invalid Base64 input. Please check your string.';
          } else {
            errorMsg.textContent = '❌ Encoding error: ' + e.message;
          }
          outputText.value = '';
        }
        updateCounts();
      }

      // Mode switching
      modeBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          modeBtns.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
          updateLabels();
          // Swap input and output content
          var temp = inputText.value;
          inputText.value = outputText.value;
          outputText.value = '';
          errorMsg.textContent = '';
          updateCounts();
        });
      });

      // Auto-process on input (with debounce)
      var debounceTimer;
      inputText.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(process, 300);
      });

      processBtn.addEventListener('click', process);

      copyBtn.addEventListener('click', function() {
        var text = outputText.value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(function() {
          var orig = copyBtn.textContent;
          copyBtn.textContent = '✅ Copied!';
          setTimeout(function() { copyBtn.textContent = orig; }, 2000);
        }).catch(function() {
          outputText.select();
          document.execCommand('copy');
          var orig = copyBtn.textContent;
          copyBtn.textContent = '✅ Copied!';
          setTimeout(function() { copyBtn.textContent = orig; }, 2000);
        });
      });

      clearBtn.addEventListener('click', function() {
        inputText.value = '';
        outputText.value = '';
        errorMsg.textContent = '';
        updateCounts();
        inputText.focus();
      });

      swapBtn.addEventListener('click', function() {
        var temp = inputText.value;
        inputText.value = outputText.value;
        outputText.value = '';
        // Toggle mode
        var newMode = currentMode === 'encode' ? 'decode' : 'encode';
        modeBtns.forEach(function(b) {
          b.classList.toggle('active', b.dataset.mode === newMode);
        });
        currentMode = newMode;
        updateLabels();
        errorMsg.textContent = '';
        process();
      });

      updateLabels();
      updateCounts();
    })();
  </script>
