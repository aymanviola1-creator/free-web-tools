  <script>
    (function() {
      var picker = document.getElementById('colorPicker');
      var preview = document.getElementById('colorPreview');
      var hexLabel = document.getElementById('hexLabel');
      var hexVal = document.getElementById('hexValue');
      var rgbVal = document.getElementById('rgbValue');
      var hslVal = document.getElementById('hslValue');
      var hS = document.getElementById('hueSlider');
      var sS = document.getElementById('satSlider');
      var lS = document.getElementById('ligSlider');
      var hV = document.getElementById('hueVal');
      var sV = document.getElementById('satVal');
      var lV = document.getElementById('ligVal');
      var harmonyGrid = document.getElementById('harmonyGrid');

      function hslToHex(h, s, l) {
        s /= 100; l /= 100;
        var a = s * Math.min(l, 1 - l);
        var f = function(n) {
          var k = (n + h / 30) % 12;
          var color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
          return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return '#' + f(0) + f(8) + f(4);
      }

      function hexToRgb(hex) {
        hex = hex.replace('#', '');
        if (hex.length === 3) hex = hex.split('').map(function(c) { return c + c; }).join('');
        var num = parseInt(hex, 16);
        return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
      }

      function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        var max = Math.max(r, g, b), min = Math.min(r, g, b);
        var h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; }
        else {
          var d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
            case g: h = ((b - r) / d + 2) / 6; break;
            case b: h = ((r - g) / d + 4) / 6; break;
          }
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
      }

      function updateFromPicker() {
        var hex = picker.value;
        var rgb = hexToRgb(hex);
        var hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
        hS.value = hsl.h;
        sS.value = hsl.s;
        lS.value = hsl.l;
        updateDisplay(hex, rgb, hsl);
      }

      function updateFromSliders() {
        var h = parseInt(hS.value);
        var s = parseInt(sS.value);
        var l = parseInt(lS.value);
        var hex = hslToHex(h, s, l);
        var rgb = hexToRgb(hex);
        picker.value = hex;
        updateDisplay(hex, rgb, { h: h, s: s, l: l });
      }

      function updateDisplay(hex, rgb, hsl) {
        preview.style.background = hex;
        hexLabel.textContent = hex;
        hexLabel.style.color = (hsl.l > 60) ? '#000' : '#fff';
        hexVal.value = hex;
        rgbVal.value = 'rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')';
        hslVal.value = 'hsl(' + hsl.h + ', ' + hsl.s + '%, ' + hsl.l + '%)';
        hV.textContent = hsl.h;
        sV.textContent = hsl.s + '%';
        lV.textContent = hsl.l + '%';
        updateHarmonies(hsl);
      }

      function updateHarmonies(hsl) {
        var harmonies = [
          { name: 'Complementary', h: (hsl.h + 180) % 360, s: hsl.s, l: hsl.l },
          { name: 'Analogous 1', h: (hsl.h + 30) % 360, s: hsl.s, l: hsl.l },
          { name: 'Analogous 2', h: (hsl.h - 30 + 360) % 360, s: hsl.s, l: hsl.l },
          { name: 'Triadic 1', h: (hsl.h + 120) % 360, s: hsl.s, l: hsl.l },
          { name: 'Triadic 2', h: (hsl.h + 240) % 360, s: hsl.s, l: hsl.l }
        ];
        harmonyGrid.innerHTML = '';
        harmonies.forEach(function(h) {
          var hex = hslToHex(h.h, h.s, h.l);
          var div = document.createElement('div');
          div.className = 'harmony-swatch';
          div.style.background = hex;
          div.textContent = hex;
          div.title = h.name + ': ' + hex;
          div.addEventListener('click', function() {
            var rgb = hexToRgb(hex);
            var hsl2 = rgbToHsl(rgb.r, rgb.g, rgb.b);
            picker.value = hex;
            hS.value = hsl2.h;
            sS.value = hsl2.s;
            lS.value = hsl2.l;
            updateDisplay(hex, rgb, hsl2);
          });
          harmonyGrid.appendChild(div);
        });
      }

      picker.addEventListener('input', updateFromPicker);
      hS.addEventListener('input', updateFromSliders);
      sS.addEventListener('input', updateFromSliders);
      lS.addEventListener('input', updateFromSliders);

      document.querySelectorAll('.copy-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var id = this.dataset.copy;
          var input = document.getElementById(id);
          if (!input) return;
          navigator.clipboard.writeText(input.value).then(function() {
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
          }).catch(function() {
            input.select();
            document.execCommand('copy');
            var orig = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
          });
        });
      });

      updateFromPicker();
    })();
  </script>
