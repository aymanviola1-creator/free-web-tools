  <script>
    // ===== Core CSS Minification =====

    function minifyCSS(css, opts) {
      if (!css || !css.trim()) return '';
      opts = opts || {};

      // Remove comments
      if (opts.removeComments !== false) {
        css = css.replace(/\/\*[\s\S]*?\*\//g, '');
      }
      // Remove whitespace around brackets, colons, semicolons, commas
      css = css.replace(/\s*{\s*/g, '{');
      css = css.replace(/\s*}\s*/g, '}');
      css = css.replace(/\s*:\s*/g, ':');
      css = css.replace(/\s*;\s*/g, ';');
      css = css.replace(/\s*,\s*/g, ',');
      css = css.replace(/\s*>\s*/g, '>');
      css = css.replace(/\s*\+\s*/g, '+');
      css = css.replace(/\s*~\s*/g, '~');
      css = css.replace(/\s*\/\s*/g, '/');
      // Remove extra whitespace
      css = css.replace(/\s+/g, ' ');
      // Remove spaces before !important
      css = css.replace(/\s*!\s*important/g, '!important');
      // Remove last semicolon in block
      css = css.replace(/;}/g, '}');
      // Remove leading/trailing whitespace
      css = css.trim();
      // Strip units on zero values
      if (opts.stripUnits) {
        css = css.replace(/(?<=[:\s])0(px|em|rem|pt|cm|mm|in|vh|vw|vmin|vmax|%|ex|ch|pc)/g, '0');
      }
      // Hex shorthand
      if (opts.hexShorthand) {
        css = css.replace(/#([0-9a-f])\1([0-9a-f])\2([0-9a-f])\3/gi, '#$1$2$3');
      }
      return css;
    }

    function beautifyCSS(css) {
      if (!css || !css.trim()) return '';
      css = minifyCSS(css);
      var indent = '  ';
      var out = '';
      var depth = 0;
      var inBlock = false;
      for (var i = 0; i < css.length; i++) {
        var ch = css[i];
        if (ch === '{') {
          out += ' {\n';
          depth++;
          inBlock = true;
        } else if (ch === '}') {
          depth--;
          out += '\n' + indent.repeat(depth) + '}';
          inBlock = false;
        } else if (ch === ';') {
          out += ';\n';
          inBlock = false;
        } else if (ch === ' ' && !inBlock && out.length > 0 && out[out.length-1] !== '\n') {
          out += '\n' + indent.repeat(depth);
        } else {
          if (!inBlock && (ch === ' ' || ch === '\n' || ch === '\t' || ch === '\r')) continue;
          if (ch === ' ' && out.length > 1 && out[out.length-1] === ' ') continue;
          out += ch;
          if (ch === ',' && depth === 0) {
            out += '\n' + indent.repeat(depth);
          }
        }
        inBlock = (ch === '{' || (inBlock && ch !== ';' && ch !== '}'));
      }
      return out;
    }

    function updateStats(input, output) {
      var inputSize = new Blob([input]).size;
      var outputSize = new Blob([output]).size;
      var saved = inputSize - outputSize;
      var pct = inputSize > 0 ? (saved / inputSize * 100).toFixed(1) : 0;
      var statsEl = document.getElementById('outputStats');
      statsEl.innerHTML = '<span>Input: <strong>' + formatBytes(inputSize) + '</strong> → Output: <strong>' + formatBytes(outputSize) + '</strong> <span class="badge-saved">-' + pct + '%</span></span>';
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function processCSS() {
      var input = document.getElementById('cssInput').value;
      if (!input.trim()) {
        document.getElementById('cssOutput').value = '';
        document.getElementById('statusMsg').innerHTML = '<span class="error">⚠️ Please paste some CSS code first.</span>';
        return;
      }
      var opts = {
        removeComments: document.getElementById('removeComments').checked,
        stripUnits: document.getElementById('optStripUnits').checked,
        hexShorthand: document.getElementById('optHexShorthand').checked
      };
      var output = minifyCSS(input, opts);
      document.getElementById('cssOutput').value = output;
      updateStats(input, output);
      document.getElementById('statusMsg').innerHTML = '<span class="success">✅ CSS minified successfully!</span>';
      setTimeout(function() { document.getElementById('statusMsg').innerHTML = ''; }, 2000);
    }

    function beautifyCSSAction() {

    function copyOutput() {
      var output = document.getElementById('cssOutput').value;
      if (!output) return;
      navigator.clipboard.writeText(output).then(function() {
        var msgEl = document.getElementById('copyMsg');
        msgEl.textContent = '✅ Copied!';
        setTimeout(function() { msgEl.textContent = ''; }, 1500);

    }

    function downloadOutput() {
      var output = document.getElementById('cssOutput').value;
      if (!output) return;
      var blob = new Blob([output], {type: 'text/css'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'minified.css';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Auto-process on input change with debounce
