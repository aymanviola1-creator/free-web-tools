<body>
  <div class="container">
    <div class="header">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark/light mode">🌙</button>

      <p>Minify HTML for production or beautify for readability. Fully client-side.</p>
    </div>

    <a href="../../" class="back-link">← Back to all tools</a>

    <!-- Tool -->
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div class="tabs" style="display:flex;gap:0;background:var(--bg-input);border-radius:6px;overflow:hidden;border:1px solid var(--border);">
          <div class="tab active" style="flex:1;text-align:center;padding:0.5rem 1rem;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--accent);background:#1f6feb33;" onclick="switchTab('minify')">Minify</div>
          <div class="tab" style="flex:1;text-align:center;padding:0.5rem 1rem;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--text-secondary);" onclick="switchTab('beautify')">Beautify</div>
        </div>
        <div class="stats" id="liveStats">Ready</div>
      </div>

      <div class="split">
        <div>
          <label for="htmlInput">Input HTML</label>
          <textarea id="htmlInput" placeholder="Paste your HTML here...">&lt;div class=&quot;container&quot;&gt;&lt;!-- main --&gt;&lt;h1&gt;Hello World&lt;/h1&gt;&lt;p&gt;This is a paragraph.&lt;/p&gt;&lt;/div&gt;</textarea>
        </div>
        <div>
          <div class="output-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem;">
            <label style="margin:0;">Output</label>
            <div>
              <span class="copy-msg" id="copyMsg"></span>
            </div>
          </div>
          <textarea id="htmlOutput" placeholder="Output will appear here..." readonly style="min-height:250px;"></textarea>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn btn-primary" onclick="processHTML()">▶ Process</button>
        <button class="btn" onclick="copyOutput()">📋 Copy</button>
        <button class="btn" onclick="downloadOutput()">⬇ Download</button>
        <button class="btn" onclick="clearAll()">🗑 Clear</button>
      </div>

      <div class="check-row">
        <label><input type="checkbox" id="chkComments" checked onchange="processHTML()"> Remove comments</label>
        <label><input type="checkbox" id="chkWhitespace" checked onchange="processHTML()"> Collapse whitespace</label>
        <label><input type="checkbox" id="chkQuotes" onchange="processHTML()"> Remove optional quotes</label>
        <label><input type="checkbox" id="chkAttrs" onchange="processHTML()"> Minify boolean attrs</label>
      </div>

      <div id="statusMsg"></div>
      <div id="outputStats" class="stats" style="margin-top:0.5rem;"></div>
    </div>

    <!-- Share Buttons -->
    <div class="share-buttons">
      <a href="https://twitter.com/intent/tweet?text=Free%20HTML%20Minifier%20%26%20Beautifier%20%E2%80%94%20minify%20or%20beautify%20HTML%20instantly!&url=https%3A%2F%2Faymanviola1-creator.github.io%2Ffree-web-tools%2Fapps%2Fhtml-minifier%2F" target="_blank" rel="noopener" style="background:#1d9bf0;">🐦 Twitter</a>

      <a href="https://www.reddit.com/submit?url=https%3A%2F%2Faymanviola1-creator.github.io%2Ffree-web-tools%2Fapps%2Fhtml-minifier%2F&title=Free%20HTML%20Minifier%20%26%20Beautifier%20Online" target="_blank" rel="noopener" style="background:#ff4500;">🔴 Reddit</a>
    </div>

    <!-- Adsterra + Monetag Ads -->
    <div class="ad-section" id="adContainer">
      <script type="text/javascript">
        (function() {
          var c = document.getElementById('adContainer');
          if (!c) return;
          try {
            var s = document.createElement('script');
            s.type = 'text/javascript';
            s.src = '//pl191315.effectivegate.com/1c/cc/ab/1cccab04fdd2b1742bb6b1f3689d1c91.js';
            s.async = true;
            c.innerHTML = '';
            c.appendChild(s);
          } catch(e) {}
        })();

    </div>

    <script>
      // ====== DARK/LIGHT THEME ======
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light') {
          document.body.classList.add('light');
          var btn = document.getElementById('themeBtn');
          if (btn) btn.textContent = '☀️';
        }
      })();
      function toggleTheme() {
        var body = document.body, btn = document.getElementById('themeBtn');
        body.classList.toggle('light');
        if (body.classList.contains('light')) {
          localStorage.setItem('theme', 'light'); btn.textContent = '☀️';
        } else {
          localStorage.setItem('theme', 'dark'); btn.textContent = '🌙';
        }
      }

      // ====== TABS ======
      var activeMode = 'minify';
      function switchTab(mode) {
        activeMode = mode;
        var tabs = document.querySelectorAll('.tab');
        tabs.forEach(function(t) {
          if (t.textContent.trim().toLowerCase() === mode) {
            t.style.background = '#1f6feb33';
            t.style.color = 'var(--accent)';
          } else {
            t.style.background = 'transparent';
            t.style.color = 'var(--text-secondary)';
          }
        });
        processHTML();
      }

      // ====== HTML MINIFIER ======
      function processHTML() {
        var input = document.getElementById('htmlInput').value;
        if (!input.trim()) {
          document.getElementById('htmlOutput').value = '';
          document.getElementById('outputStats').innerHTML = '';
          return;
        }
        try {
          var output = input;
          var chkComments = document.getElementById('chkComments').checked;
          var chkWhitespace = document.getElementById('chkWhitespace').checked;
          var chkQuotes = document.getElementById('chkQuotes').checked;
          var chkAttrs = document.getElementById('chkAttrs').checked;

          if (activeMode === 'minify') {
            if (chkComments) {
              output = output.replace(/<!--[\s\S]*?-->/g, '');
            }
            if (chkWhitespace) {
              // Collapse multiple whitespace
              output = output.replace(/\s+/g, ' ');
              // Remove whitespace between tags
              output = output.replace(/>\s+</g, '><');
              // Trim each line
              output = output.replace(/^\s+|\s+$/gm, '');
            }
            if (chkQuotes) {
              output = output.replace(/\s([\w-]+)=["']([\w-]+)["']/g, ' $1=$2');
            }
            if (chkAttrs) {
              output = output.replace(/\s(disabled|checked|selected|readonly|required|multiple|autofocus|novalidate|formnovalidate|hidden|async|defer|ismap|itemscope|noresize|noshade|nowrap|reversed|scoped|seamless|typemustmatch|default)\s*=\s*(?:""|''|[\w-]+)/gi, ' $1');
            }
            // Remove trailing whitespace
            output = output.trim();
          } else {
            // Beautify
            if (chkComments) {
              output = output.replace(/<!--[\s\S]*?-->/g, '');
            }
            // Indent HTML
            var indent = 0;
            var lines = output.replace(/>/g, '>\n').replace(/</g, '\n<').split('\n');
            var result = [];
            var inPre = false;
            for (var i = 0; i < lines.length; i++) {
              var line = lines[i].trim();
              if (!line) continue;
              if (line.indexOf('</') === 0) indent--;
              if (inPre) {
                result.push(lines[i]);
                if (line.indexOf('</pre') === 0) inPre = false;
                continue;
              }
              if (line.indexOf('<pre') === 0) { inPre = true; }
              var spaces = '';
              for (var j = 0; j < Math.max(0, indent); j++) spaces += '  ';
              result.push(spaces + line);
              if (line.indexOf('<') === 0 && line.indexOf('</') !== 0 && line.indexOf('/>') === -1 && line.indexOf('<!') !== 0) {
                var tagName = line.match(/^<\s*(\w+)/);
                if (tagName && ['br','hr','img','input','meta','link','area','base','col','embed','source','track','wbr'].indexOf(tagName[1].toLowerCase()) === -1) {
                  indent++;
                }
              }
            }
            output = result.join('\n');
          }
          document.getElementById('htmlOutput').value = output;
          updateStats(input, output);
          document.getElementById('statusMsg').innerHTML = '<span class="success">✅ HTML processed successfully</span>';
          setTimeout(function() { document.getElementById('statusMsg').innerHTML = ''; }, 2000);
        } catch(e) {
          document.getElementById('statusMsg').innerHTML = '<span class="error">⚠ Error: ' + e.message + '</span>';
        }
      }

      function updateStats(input, output) {
        var inSize = new Blob([input]).size;
        var outSize = new Blob([output]).size;
        var saved = inSize - outSize;
        var pct = inSize > 0 ? ((saved / inSize) * 100).toFixed(1) : 0;
        var inLines = input.split('\n').length;
        var outLines = output.split('\n').length;
        document.getElementById('liveStats').innerHTML =
          '📊 ' + inSize.toLocaleString() + 'B → ' + outSize.toLocaleString() + 'B (' + pct + '% saved) · ' +
          inLines + '→' + outLines + ' lines';
        document.getElementById('outputStats').innerHTML =
          'Input: ' + inSize.toLocaleString() + ' bytes · Output: ' + outSize.toLocaleString() + ' bytes · Saved: ' + saved.toLocaleString() + ' bytes (' + pct + '%)';
      }

      function copyOutput() {
        var output = document.getElementById('htmlOutput').value;
        if (!output) return;
        navigator.clipboard.writeText(output).then(function() {
          document.getElementById('copyMsg').textContent = '✅ Copied!';
          setTimeout(function() { document.getElementById('copyMsg').textContent = ''; }, 1500);
        });
      }

      function downloadOutput() {
        var output = document.getElementById('htmlOutput').value;
        if (!output) return;
        var ext = activeMode === 'minify' ? '.min.html' : '.html';
        var blob = new Blob([output], {type: 'text/html'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'output' + ext;
        a.click();
        URL.revokeObjectURL(url);
      }

      function clearAll() {
        document.getElementById('htmlInput').value = '';
        document.getElementById('htmlOutput').value = '';
        document.getElementById('outputStats').innerHTML = '';
        document.getElementById('statusMsg').innerHTML = '';
      }

      var debounceTimer;
      document.getElementById('htmlInput').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(processHTML, 500);
      });

      // Initial process
      processHTML();
    </script>
  </div>
</body>
