<body>
  <div class="container">

    <div class="card">
      <div class="drop-zone" id="dropZone">
        <div class="icon">📁</div>
        <p>Drop an image here or <span class="browse" onclick="document.getElementById('fileInput').click()">browse</span></p>
        <p style="font-size:0.75rem;color:#484f58;margin-top:0.3rem;">Supports PNG, JPEG, WebP — up to 20MB</p>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">

      <div class="controls" id="controls">
        <div class="control-row">
          <label>Quality</label>
          <input type="range" id="qualitySlider" min="10" max="100" value="80">

        </div>
        <div class="control-row">
          <label>Output Format</label>
          <select class="format-select" id="formatSelect">
            <option value="image/jpeg">JPEG</option>
            <option value="image/png">PNG</option>
            <option value="image/webp">WebP</option>
          </select>
        </div>
        <div class="control-row">
          <label>Max Width (px)</label>
          <input type="number" id="maxWidth" value="1920" min="100" max="4096" style="width:80px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e4e6ec;padding:0.4rem;text-align:center;">
        </div>

        <div class="preview-box">

        </div>
      </div>

      <button class="btn btn-download" id="downloadBtn" style="display:none;" onclick="downloadCompressed()">⬇ Download Compressed Image</button>

  <script>
    let originalFile = null;
    let compressedBlob = null;
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const controls = document.getElementById('controls');
    const preview = document.getElementById('preview');
    const qualitySlider = document.getElementById('qualitySlider');
    const qualityValue = document.getElementById('qualityValue');
    const formatSelect = document.getElementById('formatSelect');
    const maxWidth = document.getElementById('maxWidth');
    const originalPreview = document.getElementById('originalPreview');
    const compressedPreview = document.getElementById('compressedPreview');
    const originalSize = document.getElementById('originalSize');
    const compressedSize = document.getElementById('compressedSize');
    const savings = document.getElementById('savings');
    const downloadBtn = document.getElementById('downloadBtn');

    // Drag and drop handlers
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

    qualitySlider.addEventListener('input', () => {
      qualityValue.textContent = qualitySlider.value + '%';
      if (originalFile) compressImage();
    });
    formatSelect.addEventListener('change', () => { if (originalFile) compressImage(); });
    maxWidth.addEventListener('input', () => { if (originalFile) compressImage(); });

    function handleFile(file) {
      if (!file.type.match(/image\/(png|jpeg|webp)/)) {
        alert('Please select a PNG, JPEG, or WebP image.');
        return;
      }
      if (file.size > 20 * 1024 * 1024) {
        alert('File is too large. Maximum size is 20MB.');
        return;
      }
      originalFile = file;
      controls.classList.add('active');

      const reader = new FileReader();
      reader.onload = (e) => {
        originalPreview.src = e.target.result;
        originalSize.innerHTML = 'Size: <strong>' + formatBytes(file.size) + '</strong>';
        compressImage();
      };
      reader.readAsDataURL(file);
    }

    function compressImage() {
      if (!originalFile) return;
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const maxW = parseInt(maxWidth.value) || 1920;
        if (w > maxW) { h = h * (maxW / w); w = maxW; }

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, w, h);

        const quality = parseInt(qualitySlider.value) / 100;
        const format = formatSelect.value;

        canvas.toBlob((blob) => {
          if (!blob) return;
          compressedBlob = blob;
          compressedPreview.src = URL.createObjectURL(blob);
          compressedSize.innerHTML = 'Size: <strong>' + formatBytes(blob.size) + '</strong>';
          const saved = originalFile.size - blob.size;
          const percent = ((saved / originalFile.size) * 100).toFixed(1);
          if (saved > 0) {
            savings.textContent = '⬇ Saved ' + formatBytes(saved) + ' (' + percent + '%)';
            savings.style.color = '#3fb950';
          } else {
            savings.textContent = '⚠ Slightly larger (try lower quality)';
            savings.style.color = '#d29922';
          }
          preview.classList.add('active');
          downloadBtn.style.display = 'inline-block';
        }, format, quality);
      };
      img.src = originalPreview.src;
    }

    function downloadCompressed() {
      if (!compressedBlob) return;
      const ext = formatSelect.value.split('/')[1];
      const a = document.createElement('a');
      a.href = URL.createObjectURL(compressedBlob);
      a.download = 'compressed-' + (originalFile ? originalFile.name.replace(/\.[^.]+$/, '') : 'image') + '.' + ext;
      a.click();
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(2) + ' MB';
    }
  </script>
