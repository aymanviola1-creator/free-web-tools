  <script>
    // ===== Core JS Minification =====

    function minifyJS(js) {
      if (!js || !js.trim()) return '';

      // Preserve strings and regexes during minification
      var strings = [];
      var stringIndex = 0;
      // Replace strings with placeholders
      js = js.replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|`(?:[^`\\]|\\.)*`)/g, function(m) {
        strings.push(m);
        return '___STR' + (stringIndex++) + '___';
      });

      // Preserve regex literals (simple heuristic)
      var regexes = [];
      var regexIndex = 0;
      js = js.replace(/([=(,:!]|^)\s*(\/[^\/\\]*(?:\\.[^\/\\]*)*\/[gimsuyd]*)\s*/g, function(m, pre, regex) {
        regexes.push(regex);
        return pre + '___REGEX' + (regexIndex++) + '___';
      });

      // Remove comments (single-line and multi-line)
      if (document.getElementById('optStripComments').checked) {
        js = js.replace(/\/\/[^\n]*/g, '');
        js = js.replace(/\/\*[\s\S]*?\*\//g, '');
      }

      // Remove console.* statements
      if (document.getElementById('optRemoveConsole').checked) {
        js = js.replace(/console\s*\.\s*\w+\s*\([^)]*\);?\s*/g, '');
      }

      // Remove whitespace
      js = js.replace(/\s+/g, ' ');
      js = js.replace(/\s*({|}|\(|\)|;|,|:|\+|-|\*|\/|%|&&|\|\||!|=|==|===|!=|!==|<|>|<=|>=|\?)\s*/g, '$1');
      js = js.replace(/({|}|;|,|\+|-|\*|\/|%|&&|\|\||!|=|==|===|!=|!==|<|>|<=|>=|\?)\s*/g, '$1');
      // Fix spaces after keywords
      js = js.replace(/\b(if|else|for|while|do|switch|case|return|throw|try|catch|finally|function|var|let|const|typeof|instanceof|new|delete|void|in|of)\s+\{/g, '$1{');
      js = js.replace(/\b(if|else|for|while|do|switch|case|return|throw|try|catch|finally|function|var|let|const|typeof|instanceof|new|delete|void|in|of)\s+\(/g, '$1(');
      // Remove space before else/catch
      js = js.replace(/} else/g, '}else');
      js = js.replace(/} catch/g, '}catch');
      js = js.replace(/} finally/g, '}finally');
      // Remove unnecessary semicolons before }
      js = js.replace(/;}/g, '}');

      // Shorten booleans
      if (document.getElementById('optShortenTrue').checked) {
        js = js.replace(/\btrue\b/g, '!0');
        js = js.replace(/\bfalse\b/g, '!1');
      }

      // Restore strings
      for (var i = 0; i < strings.length; i++) {
        js = js.replace('___STR' + i + '___', strings[i]);
      }
      // Restore regexes
      for (var i = 0; i < regexes.length; i++) {
        js = js.replace('___REGEX' + i + '___', regexes[i]);
      }

      return js.trim();
    }

    function beautifyJS(js) {
      if (!js || !js.trim()) return '';
      // First minify to normalize
      js = minifyJS(js);
      var indent = '  ';
      var out = '';
      var depth = 0;
      var inString = false;
      var inRegex = false;
      var strChar = '';
      var newLine = true;

      for (var i = 0; i < js.length; i++) {
        var ch = js[i];
        var next = js[i+1] || '';

        // Handle strings
        if ((ch === "'" || ch === '"' || ch === '`') && !inRegex) {
          if (!inString) {
            inString = true;
            strChar = ch;
            out += ch;
            continue;
          } else if (ch === strChar && js[i-1] !== '\\') {
            inString = false;
            out += ch;
            continue;
          }
          out += ch;
          continue;
        }

        if (inString) {
          out += ch;
          continue;
        }

        // Handle regex (simple)
        if (ch === '/' && next !== '/' && next !== '*' && !inRegex) {
          // Start of regex
          inRegex = true;
          out += ch;
          continue;
        }
        if (inRegex) {
          out += ch;
          if (ch === '/' && js[i-1] !== '\\') {
            inRegex = false;
            // Consume flags
            while (i+1 < js.length && /[gimsuyd]/.test(js[i+1])) {
              out += js[++i];
            }
          }
          continue;
        }

        // Handle braces
        if (ch === '{') {
          out += ' {\n';
          depth++;
          newLine = true;
        } else if (ch === '}') {
          depth--;
          out += '\n' + indent.repeat(depth) + '}';
          newLine = false;
          if (next === ',' || next === ';') {
            // Nothing
          }
        } else if (ch === ';') {
          out += ';\n';
          newLine = true;
        } else if (ch === ',' && depth === 0) {
          out += ',\n';
          newLine = true;
        } else if (ch === '(') {
          out += '(';
          newLine = false;
        } else if (ch === ')') {
          out += ')';
          newLine = false;
        } else if (ch === ' ' && newLine) {
          continue;
        } else {
          if (newLine && ch !== ' ' && ch !== '\n') {
            out += indent.repeat(depth);
            newLine = false;
          }
          out += ch;
        }
      }

      return out;
    }

    function updateStats(input, output) {
      var inputSize = new Blob([input]).size;
      var outputSize = new Blob([output]).size;
      var saved = inputSize - outputSize;
      var pct = inputSize > 0 ? (saved / inputSize * 100).toFixed(1) : 0;
      var statsEl = document.getElementById('outputStats');
      statsEl.innerHTML = '<span>Input: <strong>' + formatBytes(inputSize) + '</strong> → Output: <strong>' + formatBytes(outputSize) + '</strong> <span class="badge-saved">-' + pct + '%</span></span>';
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

function factorial(n) {
  // Base case
  if (n <= 1) {
    return 1;
  }
  return n * factorial(n - 1);
}

// Debounce utility
function debounce(fn, delay) {
  let timer = null;
  return function(...args) {
    const context = this;
    if (timer) clearTimeout(timer);
    timer = setTimeout(() => {
      fn.apply(context, args);
      timer = null;
    }, delay);
  };
}

// Fetch with retry
async function fetchWithRetry(url, options = {}, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return await response.json();
    } catch (err) {
      console.warn('Attempt ' + (i + 1) + ' failed:', err.message);
      if (i === retries - 1) throw err;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
}`;
      document.getElementById('jsOutput').value = '';

    function copyOutput() {

    function downloadOutput() {
      var output = document.getElementById('jsOutput').value;

      a.href = url;
      a.download = 'minified.js';
      a.click();
      URL.revokeObjectURL(url);
