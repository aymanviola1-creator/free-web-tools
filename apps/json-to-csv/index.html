<body>
  <div class="container">

            <span id="copyMsg" class="copy-msg"></span>

        </div>
      </div>
      <div id="statusMsg"></div>
    </div>

    <!-- Preview -->
    <div class="card" id="previewCard" style="display:none;">
      <h2 style="font-size:1rem;margin-bottom:0.75rem;color:#c9d1d9;">👁️ Preview</h2>

    <!-- Options -->

      <h2 style="font-size:1rem;margin-bottom:0.75rem;color:#c9d1d9;">⚙️ Options</h2>

  <script>
    // ===== Core Conversion =====

    function escapeCSV(str, delimiter) {
      if (str === null || str === undefined) return '';
      str = String(str);
      // Escape quotes by doubling them
      if (str.includes('"') || str.includes(delimiter) || str.includes('\n') || str.includes('\r')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function jsonToCSV(json, delimiter, includeHeaders, addBom) {
      if (!Array.isArray(json) || json.length === 0) {
        throw new Error('JSON must be a non-empty array of objects.');
      }

      // Collect all unique keys in order (maintaining insertion order)
      var keys = [];
      var keySet = {};
      json.forEach(function(item) {
        if (item && typeof item === 'object' && !Array.isArray(item)) {
          Object.keys(item).forEach(function(k) {
            if (!keySet[k]) {
              keySet[k] = true;
              keys.push(k);
            }
          });
        } else if (item && typeof item === 'object' && Array.isArray(item)) {
          // Handle array items by index
          item.forEach(function(val, idx) {
            var k = String(idx);
            if (!keySet[k]) {
              keySet[k] = true;
              keys.push(k);
            }
          });
        }
      });

      var output = '';

      // BOM for Excel
      if (addBom) {
        output += '\uFEFF';
      }

      // Header row
      if (includeHeaders && keys.length > 0) {
        output += keys.map(function(k) { return escapeCSV(k, delimiter); }).join(delimiter) + '\r\n';
      }

      // Data rows
      json.forEach(function(item) {
        var row = keys.map(function(k) {
          var val = item && typeof item === 'object' ? item[k] : '';
          // Handle nested objects and arrays - serialize as JSON string
          if (val !== null && val !== undefined && typeof val === 'object') {
            val = JSON.stringify(val);
          }
          return escapeCSV(val, delimiter);
        });
        output += row.join(delimiter) + '\r\n';
      });

      return output;
    }

    function convertToCSV() {
      var input = document.getElementById('jsonInput').value.trim();
      if (!input) {
        document.getElementById('csvOutput').value = '';
        document.getElementById('statusMsg').innerHTML = '<span class="error">⚠️ Please enter or upload JSON data.</span>';
        return;
      }

      var delimiter = document.getElementById('delimiter').value;
      var includeHeaders = document.getElementById('optHeaders').checked;
      var addBom = document.getElementById('optBom').checked;
      var showPreview = document.getElementById('optPretty').checked;

      try {
        var parsed = JSON.parse(input);
        // Wrap single object in array
        if (!Array.isArray(parsed)) {
          parsed = [parsed];
        }

        var csv = jsonToCSV(parsed, delimiter, includeHeaders, addBom);
        document.getElementById('csvOutput').value = csv;

        // Stats
        var rows = parsed.length;
        var cols = csv.split('\n')[0].split(delimiter).length;
        var size = new Blob([csv]).size;
        document.getElementById('outputStats').textContent = rows + ' rows × ' + cols + ' cols · ' + formatBytes(size);

        // Preview table
        if (showPreview) {
          renderPreview(parsed);
        } else {
          document.getElementById('previewCard').style.display = 'none';
        }

        document.getElementById('statusMsg').innerHTML = '<span class="success">✅ Converted ' + rows + ' rows to CSV successfully!</span>';
        setTimeout(function() { document.getElementById('statusMsg').innerHTML = ''; }, 3000);
      } catch(e) {
        document.getElementById('statusMsg').innerHTML = '<span class="error">⚠️ Error: ' + e.message + '</span>';
      }
    }

    function renderPreview(data) {
      var el = document.getElementById('previewContainer');
      if (!Array.isArray(data) || data.length === 0) {
        document.getElementById('previewCard').style.display = 'none';
        return;
      }

      var keys = [];
      var keySet = {};
      data.forEach(function(item) {
        if (item && typeof item === 'object') {
          Object.keys(item).forEach(function(k) {
            if (!keySet[k]) { keySet[k] = true; keys.push(k); }
          });
        }
      });

      if (keys.length === 0) {
        document.getElementById('previewCard').style.display = 'none';
        return;
      }

      var html = '<table class="preview-table"><thead><tr>';
      keys.forEach(function(k) { html += '<th>' + escapeHtml(k) + '</th>'; });
      html += '</tr></thead><tbody>';

      var maxRows = Math.min(data.length, 50);
      for (var i = 0; i < maxRows; i++) {
        html += '<tr>';
        keys.forEach(function(k) {
          var val = data[i] ? data[i][k] : '';
          if (val !== null && val !== undefined && typeof val === 'object') {
            val = JSON.stringify(val);
          }
          html += '<td title="' + escapeHtml(String(val)) + '">' + escapeHtml(String(val)) + '</td>';
        });
        html += '</tr>';
      }

      if (data.length > 50) {
        html += '<tr><td colspan="' + keys.length + '" style="text-align:center;color:#484f58;font-style:italic;">... and ' + (data.length - 50) + ' more rows</td></tr>';
      }

      html += '</tbody></table>';
      el.innerHTML = html;
      document.getElementById('previewCard').style.display = 'block';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function handleFileUpload(event) {
      var file = event.target.files[0];
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('jsonInput').value = e.target.result;
        // Auto-convert
        convertToCSV();
      };
      reader.readAsText(file);
      // Reset file input so same file can be uploaded again
      event.target.value = '';
    }

    function loadSample() {
      document.getElementById('jsonInput').value = JSON.stringify([
        { "name": "Alice Johnson", "email": "alice@example.com", "age": 28, "city": "New York", "active": true, "salary": 65000 },
        { "name": "Bob Smith", "email": "bob@example.com", "age": 35, "city": "San Francisco", "active": true, "salary": 85000 },
        { "name": "Charlie Brown", "email": "charlie@example.com", "age": 42, "city": "Chicago", "active": false, "salary": 72000 },
        { "name": "Diana Prince", "email": "diana@example.com", "age": 31, "city": "London", "active": true, "salary": 78000 },
        { "name": "Eve Wilson", "email": "eve@example.com", "age": 26, "city": "Berlin", "active": true, "salary": 55000 }
      ], null, 2);
      document.getElementById('csvOutput').value = '';
      document.getElementById('outputStats').innerHTML = '';
      document.getElementById('statusMsg').innerHTML = '';
      document.getElementById('previewCard').style.display = 'none';
    }

    function clearAll() {
      document.getElementById('jsonInput').value = '';
      document.getElementById('csvOutput').value = '';
      document.getElementById('outputStats').innerHTML = '';
      document.getElementById('statusMsg').innerHTML = '';
      document.getElementById('previewCard').style.display = 'none';
    }

    function copyOutput() {
      var output = document.getElementById('csvOutput').value;
      if (!output) return;
      navigator.clipboard.writeText(output).then(function() {
        var msgEl = document.getElementById('copyMsg');
        msgEl.textContent = '✅ Copied!';
        setTimeout(function() { msgEl.textContent = ''; }, 1500);
      });
    }

    function downloadOutput() {
      var output = document.getElementById('csvOutput').value;
      if (!output) return;
      var blob = new Blob([output], {type: 'text/csv;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'data.csv';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
