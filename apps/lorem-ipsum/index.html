  <script>
    (function() {
      var LOREM_WORDS = [
        'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
        'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
        'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
        'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo',
        'consequat', 'duis', 'aute', 'irure', 'dolor', 'in', 'reprehenderit', 'voluptate',
        'velit', 'esse', 'cillum', 'eu', 'fugiat', 'nulla', 'pariatur', 'excepteur',
        'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui',
        'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum', 'perspiciatis',
        'unde', 'omnis', 'iste', 'natus', 'error', 'voluptatem', 'accusantium',
        'doloremque', 'laudantium', 'totam', 'aperiam', 'eaque', 'ipsa', 'quae',
        'ab', 'illo', 'inventore', 'veritatis', 'quasi', 'architecto', 'beatae',
        'vitae', 'dicta', 'sunt', 'explicabo', 'nemo', 'enim', 'ipsam', 'voluptatem',
        'quia', 'voluptas', 'aspernatur', 'odit', 'fugit', 'consequuntur', 'magni',
        'dolores', 'eos', 'qui', 'ratione', 'sequi', 'nesciunt', 'neque', 'porro',
        'quisquam', 'est', 'dolorem', 'ipsum', 'quia', 'dolor', 'amet', 'consectetur'
      ];

      var unitSelect = document.getElementById('unitSelect');
      var countInput = document.getElementById('countInput');
      var startSelect = document.getElementById('startSelect');
      var generateBtn = document.getElementById('generateBtn');
      var outputArea = document.getElementById('outputArea');
      var copyBtn = document.getElementById('copyBtn');
      var clearBtn = document.getElementById('clearBtn');
      var wordCount = document.getElementById('wordCount');

      function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      function randomWord() {
        return LOREM_WORDS[Math.floor(Math.random() * LOREM_WORDS.length)];
      }

      function generateSentence() {
        var count = 5 + Math.floor(Math.random() * 10);
        var words = [];
        for (var i = 0; i < count; i++) {
          words.push(randomWord());
        }
        var sentence = capitalize(words.join(' ')) + '.';
        return sentence;
      }

      function generateParagraph() {
        var count = 3 + Math.floor(Math.random() * 6);
        var sentences = [];
        for (var i = 0; i < count; i++) {
          sentences.push(generateSentence());
        }
        return sentences.join(' ');
      }

      function generateText() {
        var unit = unitSelect.value;
        var count = parseInt(countInput.value) || 3;
        if (count < 1) count = 1;
        if (count > 100) count = 100;
        countInput.value = count;

        var useLorem = startSelect.value === 'lorem';
        var result = '';
        var totalWords = 0;

        if (unit === 'words') {
          var words = [];
          if (useLorem) {
            words.push('Lorem', 'ipsum', 'dolor', 'sit', 'amet');
            count = Math.max(count, 5);
          }
          for (var i = 0; i < count; i++) {
            words.push(randomWord());
          }
          if (useLorem) {
            result = capitalize(words[0]) + ' ' + words.slice(1).join(' ') + '.';
          } else {
            var sentences = [];
            var chunk = 8 + Math.floor(Math.random() * 5);
            for (var j = 0; j < words.length; j += chunk) {
              var seg = words.slice(j, j + chunk);
              if (seg.length > 0) {
                sentences.push(capitalize(seg.join(' ')) + '.');
              }
            }
            result = sentences.join(' ');
          }
          totalWords = words.length;
        } else if (unit === 'sentences') {
          var sents = [];
          for (var k = 0; k < count; k++) {
            sents.push(generateSentence());
          }
          if (useLorem) {
            result = 'Lorem ipsum dolor sit amet, ' + sents.slice(1).join(' ');
          } else {
            result = sents.join(' ');
          }
          totalWords = result.split(/\s+/).length;
        } else {
          var paras = [];
          for (var m = 0; m < count; m++) {
            paras.push(generateParagraph());
          }
          if (useLorem && paras.length > 0) {
            paras[0] = 'Lorem ipsum dolor sit amet, ' + paras[0].slice(paras[0].indexOf(' ') + 1);
          }
          result = paras.join('\n\n');
          totalWords = result.split(/\s+/).length;
        }

        outputArea.value = result;
        wordCount.textContent = totalWords + ' words generated';
      }

      generateBtn.addEventListener('click', generateText);

      copyBtn.addEventListener('click', function() {
        var text = outputArea.value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(function() {
          var orig = copyBtn.textContent;
          copyBtn.textContent = '✅ Copied!';
          setTimeout(function() { copyBtn.textContent = orig; }, 2000);
        }).catch(function() {
          outputArea.select();
          document.execCommand('copy');
          var orig = copyBtn.textContent;
          copyBtn.textContent = '✅ Copied!';
          setTimeout(function() { copyBtn.textContent = orig; }, 2000);
        });
      });

      clearBtn.addEventListener('click', function() {
        outputArea.value = '';
        wordCount.textContent = '0 words generated';
      });

      // Generate on load
      generateText();
    })();
  </script>
