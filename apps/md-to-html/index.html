  <script>
    (function() {
      'use strict';

      // ── Simple Markdown Parser (no dependencies) ──
      function mdToHtml(md) {
        if (!md) return '';

        // Escape HTML entities first
        let html = md
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        // Code blocks (fenced) — must come before inline code
        html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
          const langClass = lang ? ` class="language-${lang}"` : '';
          return `<pre><code${langClass}>${code.trim()}</code></pre>`;
        });

        // Inline code
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

        // Headings (must be at start of line)
        html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

        // Horizontal rules
        html = html.replace(/^---$/gm, '<hr>');
        html = html.replace(/^\*\*\*$/gm, '<hr>');

        // Blockquotes
        html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

        // Bold and italic
        html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
        html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
        html = html.replace(/_(.+?)_/g, '<em>$1</em>');

        // Strikethrough
        html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

        // Images
        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');

        // Links
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

        // Unordered lists
        html = html.replace(/^(\s*)[-*+] (.+)$/gm, (_, indent, text) => {
          const level = Math.floor(indent.length / 2);
          const prefix = '  '.repeat(level);
          return `${prefix}<li>${text}</li>`;
        });

        // Ordered lists
        html = html.replace(/^(\s*)\d+\. (.+)$/gm, (_, indent, text) => {
          const level = Math.floor(indent.length / 2);
          const prefix = '  '.repeat(level);
          return `${prefix}<li>${text}</li>`;
        });

        // Wrap consecutive <li> in <ul> or <ol>
        html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, (match) => {
          // Determine if it's an ordered list by checking for <li> preceded by numbers in original
          // Default to ul for simplicity, but we can check
          return `<ul>\n${match}\n</ul>`;
        });

        // Clean up nested list wrapping
        html = html.replace(/<\/ul>\n?<ul>/g, '');

        // Paragraphs — wrap remaining text that isn't already in a block element
        const blockElements = /^<(\/?(?:h[1-6]|p|ul|ol|li|blockquote|pre|hr|div|table|tr|td|th|thead|tbody|img))|^\s*$/im;
        let lines = html.split('\n');
        let result = [];
        let inParagraph = false;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();

          if (!trimmed) {
            if (inParagraph) { result.push('</p>'); inParagraph = false; }
            continue;
          }

          // Check if this line is already a block-level element
          if (/^<(h[1-6]|ul|ol|li|blockquote|pre|hr|div|table|img|p)/.test(trimmed) ||
              /^<\/(ul|ol|blockquote|pre|table|p)/.test(trimmed)) {
            if (inParagraph) { result.push('</p>'); inParagraph = false; }
            result.push(line);
            continue;
          }

          if (!inParagraph) {
            result.push('<p>');
            inParagraph = true;
          } else {
            result.push(' ');
          }
          result.push(trimmed);
        }
        if (inParagraph) result.push('</p>');

        return result.join('\n');
      }

      // ── DOM refs ──
      const input = document.getElementById('markdownInput');
      const preview = document.getElementById('htmlPreview');
      const wordCount = document.getElementById('wordCount');
      const charCount = document.getElementById('charCount');
      const toast = document.getElementById('toast');

      // ── Render ──
      function render() {
        const md = input.value;
        const html = mdToHtml(md);
        preview.innerHTML = html;

        // Word & char count
        const text = md.trim();
        const words = text ? text.split(/\s+/).length : 0;
        const chars = text.length;
        wordCount.textContent = words.toLocaleString();
        charCount.textContent = chars.toLocaleString();
      }

      // ── Events ──
      input.addEventListener('input', render);

      // Clear
      document.getElementById('clearBtn').addEventListener('click', () => {
        input.value = '';
        render();
      });

      // Sample
      document.getElementById('sampleBtn').addEventListener('click', (e) => {
        e.preventDefault();
        input.value = `# Markdown Demo

## Text Formatting

This is **bold**, this is *italic*, and this is ~~strikethrough~~.

## Lists

- Item one
- Item two
- Item three

1. First step
2. Second step
3. Third step

## Code

Inline \`code\` looks like this.

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
console.log(greet("World"));
\`\`\`

## Blockquote

> This is a blockquote.
> It can span multiple lines.

## Links & Images

[Visit GitHub](https://github.com)

## Table

| Feature | Status |
|---------|--------|
| Headers | ✅ |
| Bold | ✅ |
| Lists | ✅ |
| Code | ✅ |

---

*That's all folks!*`;
        render();
      });

      // Copy HTML
      document.getElementById('copyBtn').addEventListener('click', async () => {
        const htmlOutput = preview.innerHTML;
        try {
          await navigator.clipboard.writeText(htmlOutput);
          showToast('📋 HTML copied to clipboard!');
        } catch {
          // Fallback
          const textarea = document.createElement('textarea');
          textarea.value = htmlOutput;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          showToast('📋 HTML copied!');
        }
      });

      // Download HTML
      document.getElementById('downloadBtn').addEventListener('click', () => {
        const htmlOutput = preview.innerHTML;
        const fullDoc = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Converted from Markdown</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.7; color: #333; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    blockquote { border-left: 4px solid #0366d6; padding-left: 1rem; margin-left: 0; color: #555; }
    img { max-width: 100%; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
${htmlOutput}
</body>
</html>`;

        const blob = new Blob([fullDoc], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'converted.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('⬇️ HTML file downloaded!');
      });

      // ── Toast ──
      let toastTimeout;

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
      }

      // ── Init ──
      render();
    })();
  </script>
