          var v = d << 10;
          while (QRUtil.getBCHDigit(v) - QRUtil.getBCHDigit(QRUtil.G15) >= 0) { v ^= (QRUtil.G15 << (QRUtil.getBCHDigit(v) - QRUtil.getBCHDigit(QRUtil.G15))); }
          return ((d << 10) | v) ^ QRUtil.G15_MASK;
        },
        getBCHTypeNumber: function(d) {
          var v = d << 12;
          while (QRUtil.getBCHDigit(v) - QRUtil.getBCHDigit(QRUtil.G18) >= 0) { v ^= (QRUtil.G18 << (QRUtil.getBCHDigit(v) - QRUtil.getBCHDigit(QRUtil.G18))); }
          return (d << 12) | v;
        },
        getBCHDigit: function(d) { var digit = 0; while (d != 0) { digit++; d >>>= 1; } return digit; },
        getMask: function(maskPattern, i, j) {
          switch (maskPattern) {
            case QRMaskPattern.PATTERN000: return (i + j) % 2 == 0;
            case QRMaskPattern.PATTERN001: return i % 2 == 0;
            case QRMaskPattern.PATTERN010: return j % 3 == 0;
            case QRMaskPattern.PATTERN011: return (i + j) % 3 == 0;
            case QRMaskPattern.PATTERN100: return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 == 0;
            case QRMaskPattern.PATTERN101: return (i * j) % 2 + (i * j) % 3 == 0;
            case QRMaskPattern.PATTERN110: return ((i * j) % 2 + (i * j) % 3) % 2 == 0;
            case QRMaskPattern.PATTERN111: return ((i * j) % 3 + (i + j) % 2) % 2 == 0;
            default: throw new Error("bad maskPattern:" + maskPattern);
          }
        },
        getErrorCorrectPolynomial: function(errorCorrectLength) {
          var a = new QRPolynomial([1], 0);
          for (var i = 0; i < errorCorrectLength; i++) a = a.multiply(new QRPolynomial([1, QRMath.gexp(i)], 0));
          return a;
        },
        getLostPoint: function(qrCode) {
          var moduleCount = qrCode.getModuleCount();
          var lostPoint = 0;
          for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
              var sameCount = 0;
              var dark = qrCode.isDark(row, col);
              for (var r = -1; r <= 1; r++) {
                if (row + r < 0 || moduleCount <= row + r) continue;
                for (var c = -1; c <= 1; c++) {
                  if (col + c < 0 || moduleCount <= col + c) continue;
                  if (r == 0 && c == 0) continue;
                  if (dark == qrCode.isDark(row + r, col + c)) sameCount++;
                }
              }
              if (sameCount > 5) lostPoint += (3 + sameCount - 5);
            }
          }
          for (var row = 0; row < moduleCount - 1; row++) {
            for (var col = 0; col < moduleCount - 1; col++) {
              var count = 0;
              if (qrCode.isDark(row, col)) count++;
              if (qrCode.isDark(row + 1, col)) count++;
              if (qrCode.isDark(row, col + 1)) count++;
              if (qrCode.isDark(row + 1, col + 1)) count++;
              if (count == 0 || count == 4) { lostPoint += 3; }
            }
          }
          for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount - 6; col++) {
              if (qrCode.isDark(row, col) && !qrCode.isDark(row, col + 1) && qrCode.isDark(row, col + 2) && qrCode.isDark(row, col + 3) && qrCode.isDark(row, col + 4) && !qrCode.isDark(row, col + 5) && qrCode.isDark(row, col + 6)) {
                lostPoint += 40;
              }
            }
          }
          for (var col = 0; col < moduleCount; col++) {
            for (var row = 0; row < moduleCount - 6; row++) {
              if (qrCode.isDark(row, col) && !qrCode.isDark(row + 1, col) && qrCode.isDark(row + 2, col) && qrCode.isDark(row + 3, col) && qrCode.isDark(row + 4, col) && !qrCode.isDark(row + 5, col) && qrCode.isDark(row + 6, col)) {
                lostPoint += 40;
              }
            }
          }
          var darkCount = 0;
          for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
              if (qrCode.isDark(row, col)) darkCount++;
            }
          }
          var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
          lostPoint += ratio * 10;
          return lostPoint;
        }
      };

      return {
        generate: function(data, options) {
          options = options || {};
          var minVersion = 1;
          var maxVersion = 10;
          var errorCorrectLevel = QRErrorCorrectLevel[options.errorCorrectLevel] || QRErrorCorrectLevel.M;
          var qrCode = null;
          for (var version = minVersion; version <= maxVersion; version++) {
            try {
              qrCode = new QRCodeModel(version, errorCorrectLevel);
              qrCode.addData(data);
              qrCode.make();
              break;
            } catch(e) {
              if (version >= maxVersion) throw e;
            }
          }
          return qrCode;
        },
        renderToCanvas: function(canvas, data, options) {
          options = options || {};
          var qr = QRCode.generate(data, options);
          var moduleCount = qr.getModuleCount();
          var size = options.size || 256;
          var moduleSize = size / moduleCount;
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = options.background || '#ffffff';
          ctx.fillRect(0, 0, size, size);
          ctx.fillStyle = options.color || '#000000';
          for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
              if (qr.isDark(row, col)) {
                ctx.fillRect(col * moduleSize, row * moduleSize, Math.ceil(moduleSize), Math.ceil(moduleSize));
              }
            }
          }
          return qr;
        }
      };
    })();

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById('tab-' + this.dataset.type).classList.remove('hidden');
      });
    });

    function getQRData() {
      const activeTab = document.querySelector('.tab-btn.active');
      const type = activeTab.dataset.type;
      switch(type) {
        case 'url': return document.getElementById('urlInput').value.trim();
        case 'text': return document.getElementById('textInput').value.trim();
        case 'phone': return 'tel:' + document.getElementById('phoneInput').value.trim();
        case 'sms': {
          const p = document.getElementById('smsPhone').value.trim();
          const m = document.getElementById('smsMsg').value.trim();
          return 'SMSTO:' + p + ':' + m;
        }
        case 'wifi': {
          const ssid = document.getElementById('wifiSsid').value.trim();
          const pwd = document.getElementById('wifiPwd').value.trim();
          const enc = document.getElementById('wifiEnc').value;
          return 'WIFI:T:' + enc + ';S:' + ssid + ';P:' + pwd + ';;';
        }
        default: return '';
      }
    }

    function generateQR() {
      const data = getQRData();
      if (!data) { alert('Please enter some data'); return; }
      const canvas = document.getElementById('qrCanvas');
      const placeholder = document.getElementById('qrPlaceholder');
      const downloadRow = document.getElementById('downloadRow');

      try {
        QRCode.renderToCanvas(canvas, data, { size: 256, errorCorrectLevel: 'M' });
        canvas.classList.remove('hidden');
        placeholder.style.display = 'none';
        downloadRow.style.display = 'flex';
      } catch(e) {
        alert('Error generating QR: ' + e.message);
      }
    }

    function downloadPNG() {
      const canvas = document.getElementById('qrCanvas');
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Auto-generate on load
    window.addEventListener('load', generateQR);
  </script>
</body>
</html>
