  <script>
    var lastNumbers = [];

    document.getElementById('decimals').addEventListener('change', function() {
      document.getElementById('decimalPlacesRow').style.display = this.checked ? 'block' : 'none';
    });

    function generate() {
      var min = parseFloat(document.getElementById('minVal').value);
      var max = parseFloat(document.getElementById('maxVal').value);
      var count = parseInt(document.getElementById('count').value);
      var allowDups = document.getElementById('allowDuplicates').checked;
      var sortResults = document.getElementById('sortResults').checked;
      var leadingZeros = document.getElementById('leadingZeros').checked;
      var useDecimals = document.getElementById('decimals').checked;
      var decimalPlaces = useDecimals ? parseInt(document.getElementById('decimalPlaces').value) : 0;

      if (isNaN(min) || isNaN(max) || isNaN(count)) {
        document.getElementById('resultArea').innerHTML = '<span style="color:#f85149;">Please enter valid numbers.</span>';
        return;
      }

      if (min >= max) {
        document.getElementById('resultArea').innerHTML = '<span style="color:#f85149;">Maximum must be greater than minimum.</span>';
        return;
      }

      if (count < 1 || count > 10000) {
        document.getElementById('resultArea').innerHTML = '<span style="color:#f85149;">Count must be between 1 and 10,000.</span>';
        return;
      }

      if (!allowDups && (max - min + 1) < count) {
        document.getElementById('resultArea').innerHTML = '<span style="color:#f85149;">Range too small for ' + count + ' unique numbers. Increase range or allow duplicates.</span>';
        return;
      }

      var numbers = [];
      if (allowDups) {
        for (var i = 0; i < count; i++) {
          var num = useDecimals
            ? parseFloat((Math.random() * (max - min) + min).toFixed(decimalPlaces))
            : Math.floor(Math.random() * (max - min + 1)) + min;
          numbers.push(num);
        }
      } else {
        var pool = [];
        var rangeSize = max - min + 1;
        if (useDecimals) {
          var multiplier = Math.pow(10, decimalPlaces);
          var dMin = Math.round(min * multiplier);
          var dMax = Math.round(max * multiplier);
          rangeSize = dMax - dMin + 1;
          if (count > rangeSize) {
            document.getElementById('resultArea').innerHTML = '<span style="color:#f85149;">Range too small for ' + count + ' unique numbers.</span>';
            return;
          }
          for (var i = 0; i < rangeSize; i++) pool.push(dMin + i);
          for (var i = pool.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
          }
          for (var i = 0; i < count; i++) {
            numbers.push(parseFloat((pool[i] / multiplier).toFixed(decimalPlaces)));
          }
        } else {
          if (count > rangeSize) {
            document.getElementById('resultArea').innerHTML = '<span style="color:#f85149;">Range too small for ' + count + ' unique numbers.</span>';
            return;
          }
          for (var i = 0; i < rangeSize; i++) pool.push(min + i);
          // Fisher-Yates shuffle
          for (var i = pool.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = pool[i]; pool[i] = pool[j]; pool[j] = t;
          }
          for (var i = 0; i < count; i++) numbers.push(pool[i]);
        }
      }

      if (sortResults) {
        numbers.sort(function(a, b) { return a - b; });
      }

      lastNumbers = numbers;

      // Display
      var area = document.getElementById('resultArea');
      area.classList.remove('generating');
      void area.offsetWidth; // trigger reflow
      area.classList.add('generating');

      var html = '';
      var maxDisplay = 500;
      var displayNums = numbers.slice(0, maxDisplay);

      if (leadingZeros && !useDecimals) {
        var maxLen = String(Math.max(Math.abs(min), Math.abs(max))).length;
        if (min < 0 || max < 0) maxLen = Math.max(maxLen, String(Math.min(Math.abs(min), Math.abs(max))).length + 1);
        for (var i = 0; i < displayNums.length; i++) {
          var isNeg = displayNums[i] < 0;
          var absStr = String(Math.abs(displayNums[i]));
          while (absStr.length < maxLen) absStr = '0' + absStr;
          html += '<span class="num-chip">' + (isNeg ? '-' : '') + absStr + '</span>';
        }
      } else {
        for (var i = 0; i < displayNums.length; i++) {
          html += '<span class="num-chip">' + displayNums[i] + '</span>';
        }
      }

      if (numbers.length > maxDisplay) {
        html += '<span style="color:#484f58;font-size:0.85rem;display:block;margin-top:0.5rem;">... and ' + (numbers.length - maxDisplay) + ' more numbers</span>';
      }

      area.innerHTML = html;

      // Update stats
      document.getElementById('statCount').textContent = numbers.length.toLocaleString();
      var sum = numbers.reduce(function(a, b) { return a + b; }, 0);
      document.getElementById('statSum').textContent = useDecimals ? sum.toFixed(decimalPlaces) : sum.toLocaleString();
      document.getElementById('statAvg').textContent = useDecimals ? (sum / numbers.length).toFixed(decimalPlaces) : (sum / numbers.length).toFixed(1);
      document.getElementById('statMin').textContent = useDecimals ? Math.min.apply(null, numbers).toFixed(decimalPlaces) : Math.min.apply(null, numbers).toLocaleString();
      document.getElementById('statMax').textContent = useDecimals ? Math.max.apply(null, numbers).toFixed(decimalPlaces) : Math.max.apply(null, numbers).toLocaleString();
    }

    function copyNumbers() {
      if (lastNumbers.length === 0) return;
      var text = lastNumbers.join(', ');
      navigator.clipboard.writeText(text).then(function() {
        var btn = event.target;
        var orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(function() { btn.textContent = orig; }, 2000);
      });
    }

    function exportCSV() {
      if (lastNumbers.length === 0) return;
      var csv = 'Number\n' + lastNumbers.join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'random-numbers.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearResult() {
      lastNumbers = [];
      document.getElementById('resultArea').innerHTML = '<span style="color:#484f58;">Click "Generate!" to get random numbers</span>';
      document.getElementById('statCount').textContent = '0';
      document.getElementById('statSum').textContent = '0';
      document.getElementById('statAvg').textContent = '0';
      document.getElementById('statMin').textContent = '0';
      document.getElementById('statMax').textContent = '0';
    }

    // Generate initial example on load
    window.addEventListener('DOMContentLoaded', function() {
      generate();
    });
  </script>
