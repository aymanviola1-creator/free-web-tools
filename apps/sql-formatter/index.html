<body>
  <div class="container">
    <div class="header">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark/light mode">🌙</button>
      <h1>🗄️ SQL Formatter & Beautifier</h1>
      <p>Format and beautify SQL queries. Supports MySQL, PostgreSQL, SQLite, MSSQL, Oracle. Fully client-side.</p>
    </div>

    <a href="../../" class="back-link">← Back to all tools</a>

    <!-- Tool -->
    <div class="card">
      <div class="row">
        <select id="dialectSelect" onchange="formatSQL()" style="max-width:200px;">
          <option value="mysql">MySQL</option>
          <option value="postgresql">PostgreSQL</option>
          <option value="sqlite">SQLite</option>
          <option value="mssql">MSSQL</option>
          <option value="oracle">Oracle</option>
        </select>
        <select id="indentSelect" onchange="formatSQL()" style="max-width:120px;">
          <option value="  ">2 spaces</option>
          <option value="    ">4 spaces</option>
          <option value="\t">Tab</option>
        </select>
        <label style="margin:0;font-weight:400;font-size:0.8rem;"><input type="checkbox" id="chkUppercase" checked onchange="formatSQL()"> Uppercase keywords</label>
        <span class="stats" id="liveStats">Ready</span>
      </div>

      <div class="split">
        <div>
          <label for="sqlInput">Input SQL</label>
          <textarea id="sqlInput" placeholder="Paste your SQL query here...">SELECT id, name, email, created_at FROM users WHERE status = 'active' AND email IS NOT NULL ORDER BY created_at DESC LIMIT 50</textarea>
        </div>
        <div>
          <div class="output-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem;">
            <label style="margin:0;">Formatted SQL</label>
            <span class="copy-msg" id="copyMsg"></span>
          </div>
          <textarea id="sqlOutput" placeholder="Formatted SQL will appear here..." readonly style="min-height:250px;"></textarea>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn btn-primary" onclick="formatSQL()">▶ Format</button>
        <button class="btn" onclick="copyOutput()">📋 Copy</button>
        <button class="btn" onclick="downloadOutput()">⬇ Download</button>
        <button class="btn" onclick="clearAll()">🗑 Clear</button>
      </div>

    </div>

    <script>
      // ====== DARK/LIGHT THEME ======
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light') {
          document.body.classList.add('light');
          var btn = document.getElementById('themeBtn');
          if (btn) btn.textContent = '☀️';
        }
      })();
      function toggleTheme() {
        var body = document.body, btn = document.getElementById('themeBtn');
        body.classList.toggle('light');
        if (body.classList.contains('light')) {
          localStorage.setItem('theme', 'light'); btn.textContent = '☀️';
        } else {
          localStorage.setItem('theme', 'dark'); btn.textContent = '🌙';
        }
      }

      // ====== SQL KEYWORDS ======
      var SQL_KEYWORDS = [
        'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'NOT', 'IN', 'IS', 'NULL', 'AS',
        'ON', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'CROSS', 'FULL',
        'INSERT', 'INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE', 'CREATE', 'TABLE',
        'ALTER', 'DROP', 'INDEX', 'VIEW', 'TRIGGER', 'PROCEDURE', 'FUNCTION',
        'IF', 'ELSE', 'THEN', 'END', 'BEGIN', 'COMMIT', 'ROLLBACK', 'TRANSACTION',
        'ORDER', 'BY', 'ASC', 'DESC', 'GROUP', 'HAVING', 'LIMIT', 'OFFSET',
        'UNION', 'ALL', 'DISTINCT', 'TOP', 'CASE', 'WHEN', 'ELSE', 'THEN',
        'EXISTS', 'BETWEEN', 'LIKE', 'ILIKE', 'REGEXP', 'GLOBAL', 'LOCAL',
        'PRIMARY', 'KEY', 'FOREIGN', 'REFERENCES', 'CONSTRAINT', 'DEFAULT',
        'CHECK', 'UNIQUE', 'AUTO_INCREMENT', 'SERIAL', 'BIGINT', 'INT', 'INTEGER',
        'SMALLINT', 'TINYINT', 'VARCHAR', 'CHAR', 'TEXT', 'BOOLEAN', 'BOOL',
        'FLOAT', 'DOUBLE', 'DECIMAL', 'NUMERIC', 'DATE', 'DATETIME', 'TIMESTAMP',
        'COUNT', 'SUM', 'AVG', 'MIN', 'MAX', 'COALESCE', 'CAST', 'CONVERT',
        'EXCEPT', 'INTERSECT', 'FETCH', 'NEXT', 'ROWS', 'ONLY', 'WITH',
        'RECURSIVE', 'OVER', 'PARTITION', 'ROW_NUMBER', 'RANK', 'DENSE_RANK',
        'LAG', 'LEAD', 'FIRST_VALUE', 'LAST_VALUE', 'NTH_VALUE',
        'GRANT', 'REVOKE', 'DENY', 'EXEC', 'EXECUTE', 'MERGE', 'TRUNCATE',
        'EXPLAIN', 'ANALYZE', 'VACUUM', 'REINDEX', 'CLUSTER'
      ];

      var SQL_KEYWORDS_SET = {};
      SQL_KEYWORDS.forEach(function(k) { SQL_KEYWORDS_SET[k] = true; });

      // Operators that cause line breaks after them
      var CLAUSE_KEYWORDS = [
        'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'ON', 'ORDER BY', 'GROUP BY',
        'HAVING', 'LIMIT', 'OFFSET', 'INNER JOIN', 'LEFT JOIN', 'RIGHT JOIN',
        'FULL JOIN', 'CROSS JOIN', 'JOIN', 'UNION', 'UNION ALL', 'EXCEPT',
        'INTERSECT', 'INSERT INTO', 'VALUES', 'SET', 'INTO'
      ];

      // ====== SQL FORMATTER ======
      function formatSQL() {
        var input = document.getElementById('sqlInput').value;
        if (!input.trim()) {
          document.getElementById('sqlOutput').value = '';
          document.getElementById('liveStats').innerHTML = 'Ready';
          return;
        }
        try {
          var indent = document.getElementById('indentSelect').value;
          var uppercase = document.getElementById('chkUppercase').checked;
          var dialect = document.getElementById('dialectSelect').value;

          var sql = input;
          // Normalize whitespace
          sql = sql.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
          sql = sql.replace(/\n/g, ' ');

          // Tokenize preserving strings
          var tokens = [];
          var current = '';
          var inString = null;
          var inComment = false;

          for (var i = 0; i < sql.length; i++) {
            var ch = sql[i];
            var next = sql[i + 1] || '';

            if (inComment) {
              if (ch === '\n') {
                inComment = false;
                if (current.trim()) tokens.push({type:'word', value:current.trim()});
                current = '';
              } else {
                current += ch;
              }
              continue;
            }

            if (inString) {
              current += ch;
              if (ch === inString && sql[i-1] !== '\\') {
                inString = null;
              }
              continue;
            }

            if (ch === "'" || ch === '"' || ch === '`') {
              if (current.trim()) tokens.push({type:'word', value:current.trim()});
              current = ch;
              inString = ch;
              continue;
            }

            if (ch === '-' && next === '-') {
              if (current.trim()) tokens.push({type:'word', value:current.trim()});
              current = '--';
              inComment = true;
              i++;
              continue;
            }

            if (ch === '/' && next === '*') {
              // Block comment - skip
              if (current.trim()) tokens.push({type:'word', value:current.trim()});
              current = '';
              var end = sql.indexOf('*/', i + 2);
              i = end !== -1 ? end + 1 : sql.length;
              continue;
            }

            if (ch === ',' || ch === '(' || ch === ')' || ch === ';') {
              if (current.trim()) tokens.push({type:'word', value:current.trim()});
              tokens.push({type:'punct', value:ch});
              current = '';
              continue;
            }

            if (ch === ' ' || ch === '\t') {
              if (current.trim()) tokens.push({type:'word', value:current.trim()});
              current = '';
              continue;
            }

            current += ch;
          }
          if (current.trim()) tokens.push({type:'word', value:current.trim()});

          // Build formatted output
          var output = '';
          var indentLevel = 0;
          var needsNewline = false;

          for (var t = 0; t < tokens.length; t++) {
            var token = tokens[t];
            var val = token.value;
            var valUpper = val.toUpperCase();

            if (token.type === 'punct') {
              if (val === '(') {
                if (output.length > 0 && output[output.length - 1] !== '\n') {
                  output += ' ';
                }
                output += '(';
                indentLevel++;
                needsNewline = true;
              } else if (val === ')') {
                indentLevel = Math.max(0, indentLevel - 1);
                output += '\n' + repeat(indent, indentLevel) + ')';
              } else if (val === ',') {
                output += ',';
                needsNewline = true;
              } else if (val === ';') {
                output += ';';
                needsNewline = true;
              }
              continue;
            }

            // Check if it's a clause keyword
            var isClause = false;
            // Check multi-word clauses
            if (t + 1 < tokens.length) {
              var twoWord = valUpper + ' ' + tokens[t+1].value.toUpperCase();
              if (CLAUSE_KEYWORDS.indexOf(twoWord) !== -1) {
                val = val + ' ' + tokens[t+1].value;
                valUpper = twoWord;
                t++;
                isClause = true;
              }
            }
            if (!isClause && CLAUSE_KEYWORDS.indexOf(valUpper) !== -1) {
              isClause = true;
            }

            var isKeyword = SQL_KEYWORDS_SET[valUpper];

            if (isClause) {
              if (output.length > 0) {
                output += '\n';
              }
              output += repeat(indent, indentLevel);
              if (uppercase) {
                output += valUpper;
              } else {
                output += val;
              }
              // Check if it's SELECT/INSERT/UPDATE/DELETE - indent next clause
              if (['SELECT', 'INSERT', 'UPDATE', 'DELETE', 'INSERT INTO'].indexOf(valUpper) !== -1) {
                indentLevel = 1;
              }
              needsNewline = false;
            } else if (val === 'AS' || val === 'as') {
              output += ' ' + (uppercase ? 'AS' : 'as') + ' ';
            } else {
              if (needsNewline && output.length > 0 && output[output.length - 1] !== '\n') {
                output += '\n' + repeat(indent, indentLevel + 1);
              }
              output += uppercase && isKeyword ? valUpper : val;
              output += ' ';
              needsNewline = false;
            }
          }

          // Clean up extra spaces
          output = output.replace(/ +/g, ' ').replace(/ \n/g, '\n').replace(/\n +/g, '\n');
          // Clean trailing spaces per line
          output = output.split('\n').map(function(l) { return l.trimRight(); }).join('\n');
          // Clean up spaces before commas
          output = output.replace(/ ,/g, ',');
          output = output.trim();

          document.getElementById('sqlOutput').value = output;
          updateStats(input, output);
          document.getElementById('statusMsg').innerHTML = '<span class="success">✅ SQL formatted successfully (' + input.split(' ').length + ' words)</span>';
          setTimeout(function() { document.getElementById('statusMsg').innerHTML = ''; }, 2000);
        } catch(e) {
          document.getElementById('statusMsg').innerHTML = '<span class="error">⚠ Error: ' + e.message + '</span>';
        }
      }

      function repeat(str, n) {
        var result = '';
        for (var i = 0; i < n; i++) result += str;
        return result;
      }

      function updateStats(input, output) {
        document.getElementById('liveStats').innerHTML = '📊 ' + output.split('\n').length + ' lines · ' + output.length + ' chars';
      }

      function copyOutput() {
        var output = document.getElementById('sqlOutput').value;
        if (!output) return;
        navigator.clipboard.writeText(output).then(function() {
          document.getElementById('copyMsg').textContent = '✅ Copied!';
          setTimeout(function() { document.getElementById('copyMsg').textContent = ''; }, 1500);
        });
      }

      function downloadOutput() {
        var output = document.getElementById('sqlOutput').value;
        if (!output) return;
        var blob = new Blob([output], {type: 'text/plain'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'formatted.sql';
        a.click();
        URL.revokeObjectURL(url);
      }

      function clearAll() {
        document.getElementById('sqlInput').value = '';
        document.getElementById('sqlOutput').value = '';
        document.getElementById('liveStats').innerHTML = 'Ready';
        document.getElementById('statusMsg').innerHTML = '';
      }

      var debounceTimer;
      document.getElementById('sqlInput').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(formatSQL, 500);
      });

      // Initial format
      formatSQL();
    </script>
  </div>
</body>
