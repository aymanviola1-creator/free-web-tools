      .display { font-size: 2.5rem; }

<body>
  <div class="container">
    <h1>⏱ Timer & Stopwatch</h1>
    <p class="subtitle">Countdown timer with sound alarm or precision stopwatch with lap tracking.</p>

    <div class="tabs">
      <div class="tab active" data-tab="timer" onclick="switchTab('timer')">⏲ Timer</div>
      <div class="tab" data-tab="stopwatch" onclick="switchTab('stopwatch')">⌚ Stopwatch</div>
    </div>

    <div class="card">
      <!-- Timer Tab -->
      <div id="timerTab">
        <div class="timer-inputs" id="timerInputs">
          <input type="number" id="hours" value="0" min="0" max="99" placeholder="HH">
          <span>:</span>
          <input type="number" id="minutes" value="5" min="0" max="59" placeholder="MM">
          <span>:</span>
          <input type="number" id="seconds" value="0" min="0" max="59" placeholder="SS">
        </div>

        <div class="display" id="timerDisplay">00:05:00</div>

        <div class="controls-row" id="timerControls">
          <button class="ctrl-btn start" id="timerStartBtn" onclick="startTimer()">▶ Start</button>
          <button class="ctrl-btn reset" id="timerResetBtn" onclick="resetTimer()" disabled>↺ Reset</button>
        </div>
      </div>

      <!-- Stopwatch Tab -->
      <div id="stopwatchTab" style="display:none;">
        <div class="display" id="stopwatchDisplay">00:00:00.00</div>

        <div class="controls-row" id="stopwatchControls">
          <button class="ctrl-btn start" id="swStartBtn" onclick="startStopwatch()">▶ Start</button>
          <button class="ctrl-btn pause" id="swPauseBtn" onclick="pauseStopwatch()" style="display:none;">⏸ Pause</button>
          <button class="ctrl-btn lap" id="swLapBtn" onclick="lapStopwatch()" style="display:none;">⏱ Lap</button>
          <button class="ctrl-btn reset" id="swResetBtn" onclick="resetStopwatch()" disabled>↺ Reset</button>
        </div>

        <div class="lap-history" id="lapHistory" style="display:none;">
          <table>
            <thead><tr><th>Lap</th><th>Time</th><th>Total</th></tr></thead>
            <tbody id="lapBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="ad-banner" id="adContainer">

  <script>
    // ===== TAB SWITCHING =====
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
      document.getElementById('timerTab').style.display = tab === 'timer' ? 'block' : 'none';
      document.getElementById('stopwatchTab').style.display = tab === 'stopwatch' ? 'block' : 'none';
    }

    // ===== TIMER =====
    let timerInterval = null;
    let timerRemaining = 0;
    let timerRunning = false;

    const timerDisplay = document.getElementById('timerDisplay');
    const hoursInput = document.getElementById('hours');
    const minutesInput = document.getElementById('minutes');
    const secondsInput = document.getElementById('seconds');
    const timerStartBtn = document.getElementById('timerStartBtn');
    const timerResetBtn = document.getElementById('timerResetBtn');

    function updateTimerDisplay(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      timerDisplay.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function pad(n) { return n.toString().padStart(2, '0'); }

    function getTimerInput() {
      const h = parseInt(hoursInput.value) || 0;
      const m = parseInt(minutesInput.value) || 0;
      const s = parseInt(secondsInput.value) || 0;
      return h * 3600 + m * 60 + s;
    }

    function startTimer() {
      if (timerRunning) return;
      if (!timerRemaining) {
        timerRemaining = getTimerInput();
        if (timerRemaining <= 0) { alert('Please set a time'); return; }
      }
      timerRunning = true;
      timerStartBtn.textContent = '⏸ Pause';
      timerStartBtn.className = 'ctrl-btn pause';
      timerStartBtn.onclick = pauseTimer;
      timerResetBtn.disabled = false;
      timerDisplay.classList.add('running');
      timerDisplay.classList.remove('paused', 'finished');
      document.getElementById('timerInputs').style.opacity = '0.5';

      timerInterval = setInterval(() => {
        timerRemaining--;
        updateTimerDisplay(timerRemaining);
        if (timerRemaining <= 0) {
          clearInterval(timerInterval);
          timerRunning = false;
          timerDisplay.textContent = '00:00:00';
          timerDisplay.classList.remove('running');
          timerDisplay.classList.add('finished');
          timerStartBtn.textContent = '▶ Start';
          timerStartBtn.className = 'ctrl-btn start';
          timerStartBtn.onclick = startTimer;
          // Beep
          try { beep(); } catch(e) {}
          alert('⏰ Time is up!');
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      timerRunning = false;
      timerStartBtn.textContent = '▶ Resume';
      timerStartBtn.className = 'ctrl-btn start';
      timerStartBtn.onclick = resumeTimer;
      timerDisplay.classList.remove('running');
      timerDisplay.classList.add('paused');
    }

    function resumeTimer() {
      timerRunning = true;
      timerStartBtn.textContent = '⏸ Pause';
      timerStartBtn.className = 'ctrl-btn pause';
      timerStartBtn.onclick = pauseTimer;
      timerDisplay.classList.add('running');
      timerDisplay.classList.remove('paused');

      timerInterval = setInterval(() => {
        timerRemaining--;
        updateTimerDisplay(timerRemaining);
        if (timerRemaining <= 0) {
          clearInterval(timerInterval);
          timerRunning = false;
          timerDisplay.textContent = '00:00:00';
          timerDisplay.classList.remove('running');
          timerDisplay.classList.add('finished');
          timerStartBtn.textContent = '▶ Start';
          timerStartBtn.className = 'ctrl-btn start';
          timerStartBtn.onclick = startTimer;
          try { beep(); } catch(e) {}
          alert('⏰ Time is up!');
        }
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerRunning = false;
      timerRemaining = 0;
      updateTimerDisplay(0);
      timerDisplay.classList.remove('running', 'paused', 'finished');
      timerStartBtn.textContent = '▶ Start';
      timerStartBtn.className = 'ctrl-btn start';
      timerStartBtn.onclick = startTimer;
      timerResetBtn.disabled = true;
      document.getElementById('timerInputs').style.opacity = '1';
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } catch(e) {}
    }

    // ===== STOPWATCH =====
    let swInterval = null;
    let swRunning = false;
    let swStartTime = 0;
    let swElapsed = 0;
    let swLaps = [];
    let swPaused = false;

    const swDisplay = document.getElementById('stopwatchDisplay');
    const swStartBtn = document.getElementById('swStartBtn');
    const swPauseBtn = document.getElementById('swPauseBtn');
    const swLapBtn = document.getElementById('swLapBtn');
    const swResetBtn = document.getElementById('swResetBtn');
    const lapHistory = document.getElementById('lapHistory');
    const lapBody = document.getElementById('lapBody');

    function formatTime(ms) {
      const totalCs = Math.floor(ms / 10);
      const cs = totalCs % 100;
      const totalSec = Math.floor(totalCs / 100);
      const s = totalSec % 60;
      const totalMin = Math.floor(totalSec / 60);
      const m = totalMin % 60;
      const h = Math.floor(totalMin / 60);
      return `${pad(h)}:${pad(m)}:${pad(s)}.${pad(cs)}`;
    }

    function updateSWDisplay() {
      swDisplay.textContent = formatTime(swElapsed);
    }

    function startStopwatch() {
      if (swRunning) return;
      swRunning = true;
      swPaused = false;
      swStartTime = Date.now() - swElapsed;
      swStartBtn.style.display = 'none';
      swPauseBtn.style.display = 'inline-block';
      swLapBtn.style.display = 'inline-block';
      swResetBtn.disabled = false;
      swDisplay.classList.add('running');
      swDisplay.classList.remove('paused');

      swInterval = setInterval(() => {
        swElapsed = Date.now() - swStartTime;
        updateSWDisplay();
      }, 10);
    }

    function pauseStopwatch() {
      if (!swRunning) return;
      clearInterval(swInterval);
      swRunning = false;
      swPaused = true;
      swPauseBtn.style.display = 'none';
      swStartBtn.style.display = 'inline-block';
      swStartBtn.textContent = '▶ Resume';
      swLapBtn.style.display = 'none';
      swDisplay.classList.remove('running');
      swDisplay.classList.add('paused');
    }

    function lapStopwatch() {
      if (!swRunning) return;
      const prevTotal = swLaps.length > 0 ? swLaps[swLaps.length - 1].total : 0;
      const lapTime = swElapsed - prevTotal;
      swLaps.push({ lap: swLaps.length + 1, time: lapTime, total: swElapsed });
      renderLaps();
    }

    function resetStopwatch() {
      clearInterval(swInterval);
      swRunning = false;
      swPaused = false;
      swElapsed = 0;
      swLaps = [];
      updateSWDisplay();
      swDisplay.classList.remove('running', 'paused');
      swStartBtn.style.display = 'inline-block';
      swStartBtn.textContent = '▶ Start';
      swPauseBtn.style.display = 'none';
      swLapBtn.style.display = 'none';
      swResetBtn.disabled = true;
      lapHistory.style.display = 'none';
      lapBody.innerHTML = '';
    }

    function renderLaps() {
      lapHistory.style.display = 'block';
      lapBody.innerHTML = swLaps.map(l => {
        const prev = l.lap > 1 ? swLaps[l.lap - 2] : null;
        return `<tr><td>${l.lap}</td><td>${formatTime(l.time)}</td><td>${formatTime(l.total)}</td></tr>`;
      }).join('');
    }
  </script>
