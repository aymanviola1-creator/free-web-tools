    <script>
      // ====== DARK/LIGHT THEME ======
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'light') {
          document.body.classList.add('light');
          var btn = document.getElementById('themeBtn');

      function toggleTheme() {
        var body = document.body, btn = document.getElementById('themeBtn');
        body.classList.toggle('light');
        if (body.classList.contains('light')) {
          localStorage.setItem('theme', 'light'); btn.textContent = '☀️';
        } else {
          localStorage.setItem('theme', 'dark'); btn.textContent = '🌙';
        }
      }

      // ====== SIMPLE YAML PARSER (no dependencies) ======
      function parseYAML(text) {
        var lines = text.split('\n');
        var result = {};
        var stack = [{obj: result, indent: -1, key: null}];

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          // Skip empty lines and comments
          var trimmed = line.trim();
          if (!trimmed || trimmed[0] === '#') continue;

          // Calculate indent
          var indent = 0;
          for (var j = 0; j < line.length; j++) {
            if (line[j] === ' ') indent++;
            else break;
          }

          // Pop stack to correct indent level
          while (stack.length > 1 && indent <= stack[stack.length - 1].indent) {
            stack.pop();
          }

          // Pop stack
          var isArrayItem = trimmed[0] === '-';
          if (isArrayItem) {
            trimmed = trimmed.substring(1).trim();
          }

          // Split key: value
          var colonIdx = trimmed.indexOf(':');
          var key, value;

          if (colonIdx === -1 && isArrayItem) {
            // Array item without key
            key = null;
            value = parseYAMLValue(trimmed);
          } else if (colonIdx !== -1) {
            key = trimmed.substring(0, colonIdx).trim();
            var rest = trimmed.substring(colonIdx + 1).trim();
            if (rest.length === 0) {
              // This means the value is nested
              value = undefined;
            } else {
              value = parseYAMLValue(rest);
            }
          } else {
            continue;
          }

          var currentObj = stack[stack.length - 1].obj;

          if (isArrayItem) {
            if (!Array.isArray(currentObj)) {
              // Convert to array if not already
              if (stack.length > 1) {
                var parent = stack[stack.length - 2];
                if (parent.key !== null) {
                  var arr = [];
                  parent.obj[parent.key] = arr;
                  stack[stack.length - 1].obj = arr;
                  currentObj = arr;
                }
              }
              if (typeof currentObj === 'object' && !Array.isArray(currentObj)) {
                // Check if empty object should be array
                var keys = Object.keys(currentObj);
                if (keys.length === 0) {
                  // This is tricky - we're in an object context
                }
              }
            }
            if (Array.isArray(currentObj)) {
              if (value !== undefined) {
                currentObj.push(value);
              } else {
                var newArr = [];
                currentObj.push(newArr);
                stack.push({obj: newArr, indent: indent, key: null});
              }
            }
          } else if (key !== null) {
            if (value !== undefined) {
              if (Array.isArray(currentObj)) {
                // We're in an array context and got a key-value pair
                // This means the array item is an object
                var idx = currentObj.length - 1;
                if (typeof currentObj[idx] !== 'object' || currentObj[idx] === null) {
                  currentObj[idx] = {};
                }
                currentObj[idx][key] = value;
              } else {
                currentObj[key] = value;
              }
            } else {
              // Value is nested
              if (Array.isArray(currentObj)) {
                var idx2 = currentObj.length - 1;
                if (typeof currentObj[idx2] !== 'object' || currentObj[idx2] === null) {
                  currentObj[idx2] = {};
                }
                var newObj = {};
                currentObj[idx2][key] = newObj;
                stack.push({obj: newObj, indent: indent, key: key});
              } else {
                var newObj2 = {};
                currentObj[key] = newObj2;
                stack.push({obj: newObj2, indent: indent, key: key});
              }
            }
          }
        }

        return result;
      }

      function parseYAMLValue(val) {
        if (val === 'null' || val === '~') return null;
        if (val === 'true' || val === 'True' || val === 'TRUE') return true;
        if (val === 'false' || val === 'False' || val === 'FALSE') return false;
        // Numbers
        if (/^-?\d+$/.test(val)) return parseInt(val, 10);
        if (/^-?\d+\.\d+$/.test(val)) return parseFloat(val);
        // Strings
        if ((val[0] === "'" && val[val.length - 1] === "'") || (val[0] === '"' && val[val.length - 1] === '"')) {
          return val.substring(1, val.length - 1);
        }
        return val;
      }

      function toYAML(obj, indent, depth) {
        if (depth === undefined) depth = 0;
        if (indent === undefined) indent = '  ';
        var result = '';
        var prefix = '';
        for (var i = 0; i < depth; i++) prefix += indent;

        if (obj === null || obj === undefined) {
          return 'null';
        }
        if (typeof obj === 'string') {
          if (obj.indexOf('\n') !== -1 || obj.indexOf(':') !== -1 || obj.indexOf('#') !== -1 || obj.length > 80) {
            return "'" + obj.replace(/'/g, "''") + "'";
          }
          return obj;
        }
        if (typeof obj === 'number' || typeof obj === 'boolean') {
          return String(obj);
        }
        if (Array.isArray(obj)) {
          if (obj.length === 0) return '[]';
          var arrLines = [];
          for (var ai = 0; ai < obj.length; ai++) {
            var av = obj[ai];
            if (typeof av === 'object' && av !== null) {
              var sub = toYAML(av, indent, depth + 1);
              var subLines = sub.split('\n');
              arrLines.push(prefix + indent + '- ' + subLines[0]);
              for (var si = 1; si < subLines.length; si++) {
                arrLines.push(prefix + indent + '  ' + subLines[si]);
              }
            } else {
              arrLines.push(prefix + indent + '- ' + toYAML(av, indent, 0));
            }
          }
          return arrLines.join('\n');
        }
        if (typeof obj === 'object') {
          var keys = Object.keys(obj);
          if (keys.length === 0) return '{}';
          var objLines = [];
          for (var ki = 0; ki < keys.length; ki++) {
            var k = keys[ki];
            var v = obj[k];
            if (typeof v === 'object' && v !== null && !(typeof v === 'string')) {
              var sub2 = toYAML(v, indent, depth + 1);
              var subLines2 = sub2.split('\n');
              objLines.push(prefix + k + ': ' + subLines2[0]);
              for (var si2 = 1; si2 < subLines2.length; si2++) {
                objLines.push(prefix + indent + subLines2[si2]);
              }
            } else {
              objLines.push(prefix + k + ': ' + toYAML(v, indent, 0));
            }
          }
          return objLines.join('\n');
        }
        return String(obj);
      }

      // ====== CONVERTER ======
      function convert() {
        var input = document.getElementById('inputData').value;
        var direction = document.getElementById('directionSelect').value;
        var indent = document.getElementById('indentSelect').value === '2' ? '  ' : '    ';

        if (!input.trim()) {
          document.getElementById('outputData').value = '';
          document.getElementById('liveStats').innerHTML = 'Ready';
          return;
        }

        try {
          var output = '';
          if (direction === 'yaml2json') {
            var parsed = parseYAML(input);
            output = JSON.stringify(parsed, null, parseInt(indent));
          } else {
            var parsed2 = JSON.parse(input);
            output = toYAML(parsed2, indent, 0);
          }
          document.getElementById('outputData').value = output;
          updateStats(input, output);
          document.getElementById('statusMsg').innerHTML = '<span class="success">✅ Conversion successful!</span>';
          setTimeout(function() { document.getElementById('statusMsg').innerHTML = ''; }, 2000);
        } catch(e) {
          document.getElementById('statusMsg').innerHTML = '<span class="error">⚠ Error: ' + e.message + '</span>';
        }
      }

      function updateStats(input, output) {
        document.getElementById('liveStats').innerHTML = '📊 ' + input.length + ' → ' + output.length + ' chars';
      }

      function loadFile(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('inputData').value = e.target.result;
          convert();
        };
        reader.readAsText(file);
        event.target.value = '';
      }

      function copyOutput() {
        var output = document.getElementById('outputData').value;
        if (!output) return;
        navigator.clipboard.writeText(output).then(function() {
          document.getElementById('copyMsg').textContent = '✅ Copied!';
          setTimeout(function() { document.getElementById('copyMsg').textContent = ''; }, 1500);
        });
      }

      function downloadOutput() {
        var output = document.getElementById('outputData').value;
        if (!output) return;
        var direction = document.getElementById('directionSelect').value;
        var ext = direction === 'yaml2json' ? '.json' : '.yaml';
        var blob = new Blob([output], {type: 'text/plain'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'converted' + ext;
        a.click();
        URL.revokeObjectURL(url);
      }

      function swapInputOutput() {
        var input = document.getElementById('inputData').value;
        var output = document.getElementById('outputData').value;
        if (output) {
          document.getElementById('inputData').value = output;
          // Swap direction
          var dir = document.getElementById('directionSelect');
          dir.value = dir.value === 'yaml2json' ? 'json2yaml' : 'yaml2json';
          convert();
        }
      }

      function clearAll() {
        document.getElementById('inputData').value = '';
        document.getElementById('outputData').value = '';
        document.getElementById('liveStats').innerHTML = 'Ready';
        document.getElementById('statusMsg').innerHTML = '';
      }

      var debounceTimer;
      document.getElementById('inputData').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(convert, 500);
      });
      document.getElementById('directionSelect').addEventListener('change', convert);
      document.getElementById('indentSelect').addEventListener('change', convert);

      // Initial convert
      convert();
    </script>
